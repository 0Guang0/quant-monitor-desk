version: layer1_axis_contract_v1
authority: docs/modules/layer1_global_regime_panel.md
required_indicator_fields:
  - indicator_id
  - axis_id
  - display_name_cn
  - plain_language_summary
  - layer
  - module
  - frequency
  - unit
  - primary_source
  - validation_source
  - fallback_policy
  - allow_score
  - diagnostic_only
quality_flags:
  - MISSING_VALUE
  - STALE_DATA
  - SOURCE_SWITCHED
  - SCHEMA_DRIFT
  - INSUFFICIENT_HISTORY
  - OUTLIER_REVIEW_REQUIRED
  - NO_ACCEPTED_CHANNEL
  - FORBIDDEN_SUBSTITUTE_USED
  - BLINDSPOT_NOT_OBSERVABLE
  - ROBUST_Z_UNAVAILABLE
  - SOURCE_FALLBACK_USED
  - VALIDATION_SOURCE_USED
  - QUALITY_FAILED
  - MANUAL_REVIEW_REQUIRED
provenance_quality_contract: specs/contracts/design/source_provenance_quality_contract.yaml
required_result_provenance:
  - source_used
  - source_grade
  - quality_grade
  - manual_review_required
  - route_plan_id
  - primary_failure_reason
  - source_registry_revision
  - activation_overlay_revision
  - source_fetch_id
  - source_content_hash
forbidden_output_terms:
