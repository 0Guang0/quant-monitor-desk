version: datasource_service_contract_v1
status: active
owner: data_sources
provider_catalog_path: specs/datasource_registry/provider_catalog.yaml
purpose: "Provide a single fetch facade so Orchestrator/API/Agent do not directly use adapter factory."
facade: DataSourceService
public_methods:
  fetch:
    input: FetchRequest
    output: FetchResult
    required_steps:
      - load_source_registry
      - load_capability_registry
      - build_source_route_plan
      - check_resource_guard
      - create_adapter_internal_only
      - call_adapter_fetch
      - ensure_fetch_log_or_failure_event
  preview_route:
    input:
      { data_domain: string, operation: string, market_id: optional_string }
    output: SourceRoutePlan
    side_effects_allowed: false
call_boundaries:
  allowed_to_call_create_adapter:
    - backend.app.datasources.service.DataSourceService
    - tests with explicit create_test_adapter
  forbidden_direct_callers:
    - backend.app.api
    - backend.app.agents
    - backend.app.sync.runners
    - backend.app.layer1_axes
    - backend.app.layer2_sensors
    - backend.app.layer3_chains
    - backend.app.layer4_markets
    - backend.app.layer5_evidence
rules:
  - create_adapter remains available but is internal to DataSourceService in production paths
  - Agent tools may request read-only route previews but may not construct adapters
  - API diagnostics may preview route plans without fetching
  - proposed_disabled_source entries may be exposed in readiness/source-list diagnostics but must not be adapter-constructible until explicitly enabled
  - Orchestrator runners should depend on DataSourceService or a narrow fetch callable rather than vendor adapter classes
  - tests may use create_test_adapter only when the test name and fixture explicitly indicate test-only behavior
reference_adoption:
  policy: >
    New provider/fetch-port implementations should first inspect approved mature
    reference projects under 参考项目/ and adapt only QMD-owned logic behind this
    facade. Direct runtime imports from 参考项目/** are forbidden.
  allowed_reference_uses:
    easyxt_tdx_provider: architecture_and_connection_lifecycle_only
    openbb_provider_layout: architecture_only_no_runtime_copy
    jq2ptrade_loader_shape: read_only_review_or_rehearsal_shape_only
  required_boundaries:
    - DataSourceService remains the only production fetch facade
    - SourceRoutePlan must record provider choice and disabled/fallback reasons
    - ResourceGuard must run before network or write-rehearsal operations
    - provider code must produce FetchResult/evidence lineage, not clean-table writes
    - Agent/API code may not construct adapters or expand source scope
required_tests:
  - tests/test_datasource_service.py::test_serviceBuildsRouteBeforeFetch
  - tests/test_datasource_service.py::test_apiAndAgentCannotImportAdapterFactory
  - tests/test_datasource_service.py::test_datasourceServiceContract_statusIsActive
  - tests/test_vendor_fetch_e2e.py::test_vendorFixtureFetch_e2eThroughDataSourceServicePath
  - tests/test_sync_orchestrator.py::test_runIncremental_productionProfile_requiresDatasourceService
  - tests/test_sync_orchestrator.py::test_runBackfill_productionProfile_requiresDatasourceService
  - tests/test_sync_orchestrator.py::test_runReconcile_productionProfile_rejectsAdapterBypassAdr025
