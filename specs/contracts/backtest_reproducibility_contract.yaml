version: backtest_reproducibility_contract_v1
purpose: Prevent look-ahead bias and make backtest/review runs reproducible.
reference_adoption:
  policy: >
    Reproducibility manifests bind QMD evidence refs and parameter hashes;
    adapt JQ2PTrade deterministic loader/report separation without copying
    reference DB paths or strategy execution.
  attribution_required: true
  allowed_reference_paths:
    jq2ptrade:
      - 参考项目/JQ2PTrade/ptrade_local/engine/data_loader.py
      - 参考项目/JQ2PTrade/ptrade_local/engine/report.py
required_artifacts:
  frozen_dataset_manifest:
    fields:
      - dataset_id
      - created_at
      - as_of_cutoff
      - included_fetch_ids
      - input_evidence_ids
      - content_hashes
      - exclusion_reason_if_any
  parameter_snapshot:
    fields:
      - scenario_id
      - rule_version
      - parameter_json
      - parameter_hash
      - random_seed
      - code_version
  result_manifest:
    fields:
      - run_id
      - started_at
      - completed_at
      - metrics
      - warnings
      - resource_profile
hard_rules:
  - no input observation may have visibility_timestamp after scenario as_of_cutoff
  - all random or sampling operations must set and record random_seed
  - agent text cannot change metrics; agent may only summarize computed metrics
  - backtest cannot output trading action semantics
tests:
  - test_futureObservationAfterCutoff_rejected
  - test_sameFrozenDatasetAndParams_reproducesMetrics
  - test_parameterHashChangesWhenRuleChanges
