version: source_capabilities_v1
status: draft_round2_6
authority: "Round2.6 design contract; source_registry.yaml remains source/role authority"
principles:
  - every_source_registry_allowed_domain_must_have_capability
  - adapter_supported_domains_must_be_subset_of_capabilities_after_round2_6_implementation
  - operations_are_declared_before_orchestrator_fetch
  - no_capability_means_not_schedulable
  - no_silent_fallback
notes:
  current_domain_authority: "specs/datasource_registry/source_registry.yaml"
  implementation_gap: "Current adapter supported_domains still include legacy/abstract names such as market_bar_1d and fundamental. Round2.6 implementation must reconcile adapter domains to source_registry domains or add explicit compatibility mapping tests."
sources:
  qmt_xtdata:
    domains:
      cn_equity_realtime:
        operations:
          fetch_realtime_quote:
            frequency: realtime
            fields:
              [
                instrument_id,
                timestamp,
                last_price,
                bid,
                ask,
                volume,
                amount,
                source_used,
              ]
            requires_auth: true
            requires_local_client: true
            enabled_by_default: false
      cn_equity_minute_bar:
        operations:
          fetch_minute_bar:
            frequency: intraday
            fields:
              [
                instrument_id,
                timestamp,
                open,
                high,
                low,
                close,
                volume,
                amount,
                source_used,
              ]
            requires_auth: true
            requires_local_client: true
            enabled_by_default: false
      cn_equity_daily_bar:
        operations:
          fetch_daily_bar:
            frequency: daily
            fields:
              [
                instrument_id,
                trade_date,
                open,
                high,
                low,
                close,
                volume,
                amount,
                source_used,
              ]
            requires_auth: true
            requires_local_client: true
            enabled_by_default: false
  baostock:
    domains:
      cn_equity_daily_bar:
        operations:
          fetch_daily_bar:
            frequency: daily
            fields:
              [
                instrument_id,
                trade_date,
                open,
                high,
                low,
                close,
                volume,
                amount,
                source_used,
              ]
            supports_adjustment: true
            supports_incremental: true
            supports_backfill: true
            requires_auth: false
            production_default: true
      cn_equity_basic_financial:
        operations:
          fetch_basic_financial:
            frequency: quarterly_or_annual
            fields:
              [
                instrument_id,
                report_period,
                metric_name,
                metric_value,
                source_used,
              ]
            supports_incremental: true
            requires_auth: false
            production_default: true
  akshare:
    domains:
      cn_equity_daily_bar:
        operations:
          fetch_daily_bar_validation:
            frequency: daily
            fields:
              [
                instrument_id,
                trade_date,
                open,
                high,
                low,
                close,
                volume,
                amount,
                source_used,
              ]
            supports_adjustment: source_specific
            supports_incremental: true
            supports_backfill: true
            requires_auth: false
            production_default: false
            vendor_api: stock_zh_a_hist
            upstream: push2his.eastmoney.com
          fetch_daily_bar_sina_validation:
            frequency: daily
            fields:
              [
                instrument_id,
                trade_date,
                open,
                high,
                low,
                close,
                volume,
                amount,
                source_used,
              ]
            supports_adjustment: source_specific
            requires_auth: false
            enabled_by_default: false
            pilot_only: true
            production_default: false
            vendor_api: stock_zh_a_daily
            upstream: finance.sina.com.cn
            notes: "018C sidecar only; does not close stock_zh_a_hist / Eastmoney hist."
      cn_index:
        operations:
          fetch_index_daily_bar:
            frequency: daily
            fields:
              [
                index_id,
                trade_date,
                open,
                high,
                low,
                close,
                volume,
                amount,
                source_used,
              ]
            supports_incremental: true
            requires_auth: false
      sector_board:
        operations:
          fetch_sector_board:
            frequency: daily
            fields:
              [board_id, trade_date, metric_name, metric_value, source_used]
            supports_incremental: true
            requires_auth: false
      macro_supplementary:
        operations:
          fetch_macro_series:
            frequency: source_specific
            fields:
              [
                series_id,
                observation_date,
                metric_name,
                metric_value,
                source_used,
              ]
            supports_incremental: true
            requires_auth: false
            notes: "聚合源只能带 source_used 与 quality_flags；不得作为唯一事实源。"
