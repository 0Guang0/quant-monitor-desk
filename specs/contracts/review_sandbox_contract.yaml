version: review_sandbox_contract_v1
status: draft_round2_6
owner: review_security
purpose: "Allow optional read-only strategy/evidence review without executing trading code."
static_analysis_only: true
execution_mode_note: >
  First Round4 vertical slice (Batch A) is static analysis only. Any runtime
  execution requires explicit REVIEW-SBX-001 approval in a later batch.
allowed_api:
  - get_history
  - get_price
  - log.info
  - log.warning
  - log.error
  - record_metric
forbidden_api:
  - order
  - order_value
  - order_target
  - order_target_value
  - cancel_order
  - place_order
  - buy
  - sell
  - get_open_orders
  - get_portfolio
  - get_positions
  - get_orders
  - get_trades
  - run_daily
  - run_weekly
  - run_monthly
forbidden_runtime_access:
  - os
  - sys
  - subprocess
  - socket
  - requests
  - network
  - arbitrary_import
rules:
  - default mode is static analysis only; no compile/exec or arbitrary strategy runtime in Batch A
  - imported strategy snippets are scanned by AST; runtime execution deferred to REVIEW-SBX-001
  - any detected order-like API is an action_semantics_violation
  - no sandbox output may become a trading recommendation
required_tests_deferred_round4:
  - tests/test_review_sandbox_api.py::test_orderApiRejected
  - tests/test_review_sandbox_api.py::test_forbiddenImportRejected
required_tests:
  - tests/test_reference_adoption_guardrails.py::test_jq2ptradeCompileExecPatternNotCopied
  - tests/test_reference_adoption_guardrails.py::test_jq2ptradeSchedulerHookNotCopied
