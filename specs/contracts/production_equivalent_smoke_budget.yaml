# Bounded production-equivalent smoke thresholds (Batch 3F / R3F-HYG-06).
# Cross-ref: source-route matrix dry-run budget via scripts/production_gate.py
#   (check_source_route_matrix_dry_run_closure) and ADR-016.
# Does not authorize live sources or production clean write.

version: v1
name: production_equivalent_smoke_budget
owner: b3f-hyg
closure_command: >-
  uv run python scripts/acceptance_pipeline_smoke.py
  --use-service-path
  --data-root .audit-sandbox/r3b275-audit
  --write-artifact .audit-sandbox/r3b275-audit/production_equivalent_smoke_budget.json
thresholds:
  elapsed_s_max: 180
  pytest_steps_min: 5
  shard_count_benchmark_min: 1
  guard_status_required: observable
