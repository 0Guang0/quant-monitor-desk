    data_domain: macro_supplementary
    source_id: akshare
    operation: fetch_macro_series
    role: validation_only
    readiness: sandbox_candidate
    symbol_or_series: staged_sample_only
    window_cap: 30d
    row_cap: 50
    requires_user_authorization: false
    allowed_next_gate: none
    forbidden_claims:
      - primary_candidate for FRED P0 series
      - production-live ready
      - closes B2.5-O-05
    closure_test: R3-PROMPT14-AKSHARE-VAL-01 validation-only proof required
    notes: akshare validation-only；不得替代 DGS10/T10Y3M/VIXCLS/SP500/DFII10 FRED primary
