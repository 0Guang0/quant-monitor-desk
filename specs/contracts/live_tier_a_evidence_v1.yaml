# ---------------------------------------------------------------------------
# Tier A live acceptance report (CLI / CI artifact)
# ---------------------------------------------------------------------------
acceptance_report:
  format: json
  command: scripts/tier_a_live_acceptance.py
  required_top_level_fields:
    - command
    - schema_version
    - data_root
    - generated_at
    - sources
    - summary
  per_source_row_fields:
    - source_id
    - disposition
    - failure_class
    - failure_detail
    - adr_ref
    - sync_status
    - e2_inspect_status
    - f0_health_status
    - b2_validation_status
    - health_domain
    - health_profile_id
    - rule_set_id
    - clean_table
    - evidence_manifest_path
  summary_fields:
    - total
    - passed
    - failed_fixable
    - failed_external
  exit_codes:
    0: all sources PASS or FAIL_EXTERNAL with merged ADR
    1: any FAIL_FIXABLE or FAIL_EXTERNAL without ADR
    2: invalid environment
  failure_artifact:
    filename_pattern: tier_a_live_acceptance_failure_{run_id}.json
    required_when: exit_code != 0
    fields:
      - command
      - schema_version
      - data_root
      - generated_at
      - exit_code
      - sources
      - summary
      - first_failure_source_id
      - failure_detail
    ci_upload: required_on_workflow_failure

reference_adoption:
  easyxt_data_health:
    applies_to_profiles:
      - market_bar_p0
      - layer1_observation_p0
      - disclosure_p0
      - crypto_derivative_p0
    level: L2_copy_and_rewrite
    note: Check categories and report orchestration only; no runtime import.
  jq2ptrade_report_shape:
    applies_to: acceptance_report
    level: L3_architecture_or_concept_only
    note: Structured JSON artifact for CI; not backtest report.py text.

required_tests:
  - tests/test_live_tier_a_evidence_contract.py
  - tests/test_tier_a_live_acceptance_report.py
  - tests/test_tier_a_live_b2_acceptance.py
