version: platform_source_matrix_v1
status: draft
owner: data_sources
platforms:
  windows:
    qmt_xtdata:
      available_if_user_configured: true
      default_enabled: false
      requires_user_confirmation: true
      requires_env: [QMT_XTDATA_AUTHORIZED]
