chain_priority_dictionary:
  P0_CORE: 第一版核心监控链，默认进入前端主页面和每日摘要。
  P1_THEME: 重要主题链，进入前端二级页面和周度/事件驱动摘要。
  P1_GLOBAL_MACRO: 全球宏观产业链，适合跨资产和事件驱动监控。
  P2_OPTIONAL: 可选观察链，先保留结构，默认不进入日常核心监控。
anchor_priority_dictionary:
  P0_CORE: 核心锚点，默认每日监控；若异常应进入日报和前端首页。
  P0_EVENT: 核心事件锚，不是普通行情标的，但融资、订单、产品、合作等事件需进入日报。
  P1_ACTIVE: 重要锚点，进入产业链页面和事件驱动摘要。
  P1_EVENT: 重要事件锚，默认不进行情表，但事件需要进入产业链解释。
  P1_PRICE: 重要商品/指数价格锚，用于供需约束和成本传导解释。
  P2_WATCH: 观察锚点，先保留映射，默认不进入核心首页。
