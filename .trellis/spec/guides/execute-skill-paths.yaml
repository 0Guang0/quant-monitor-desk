# 条件 skill 触发 SSOT：agent-toolchain.md §Execute — 条件 skill
# TDD：/test-driven-development（RED/GREEN 必做）

version: "1.2"

skills:
  agent-toolchain:
    path: agent-toolchain.md
    phase: boot
    default_role: 必做
    note: "场景工具路由；全员必读（根目录）"

  trellis-execute:
    path: .cursor/skills/trellis-execute/SKILL.md
    phase: boot
    default_role: 必做

  trellis-execute-principles:
    path: .cursor/skills/trellis-execute/principles.md
    phase: boot
    default_role: 必做
    note: "TDD 分轨 · karpathy/testing · 指针 project-global.mdc ponytail/禁止捷径/无遗留"

  project-global:
    path: .cursor/rules/project-global.mdc
    phase: boot
    default_role: 必做
    note: "alwaysApply；ponytail 细则 · 禁止捷径 · grill-me · 无遗留"

  test-driven-development:
    path: .claude/plugins/cache/addy-agent-skills/agent-skills/3a6fc6392823/skills/test-driven-development/SKILL.md
    phase: RED
    default_role: 必做
    fallback: .claude/skills/test-driven-development/SKILL.md
    note: "Invoke as /test-driven-development; RED+GREEN SSOT; 含系统化 TDD 流程与规范"

  karpathy-guidelines:
    path: .cursor/plugins/cache/karpathy-skills/andrej-karpathy-skills/2c606141936f1eeef17fa3043a72095b4765b9c2/skills/karpathy-guidelines/SKILL.md
    phase: RED
    default_role: 必做
    note: "RED 写测试 + GREEN 写正式代码均遵守"

  testing-guidelines:
    path: .cursor/skills/testing-guidelines/SKILL.md
    phase: RED
    default_role: 必做
    note: "五字段 docstring；RED 写测 + GREEN 确认覆盖"

  incremental-implementation:
    path: .claude/plugins/cache/addy-agent-skills/agent-skills/3a6fc6392823/skills/incremental-implementation/SKILL.md
    phase: SLICE
    default_role: 必做
    fallback: .agents/skills/incremental-implementation/SKILL.md

  source-driven-development:
    path: .agents/skills/source-driven-development/SKILL.md
    phase: GREEN
    default_role: 条件
    trigger_ref: agent-toolchain.md#execute--条件-skillssot--触发才-read

  deprecation-and-migration:
    path: .agents/skills/deprecation-and-migration/SKILL.md
    phase: GREEN
    default_role: 条件
    trigger_ref: agent-toolchain.md#execute--条件-skillssot--触发才-read

  observability-and-instrumentation:
    path: .agents/skills/observability-and-instrumentation/SKILL.md
    phase: SLICE
    default_role: 条件
    trigger_ref: agent-toolchain.md#execute--条件-skillssot--触发才-read

  systematic-debugging:
    path: .claude/plugins/cache/claude-plugins-official/superpowers/5.1.0/skills/systematic-debugging/SKILL.md
    phase: DEBUG
    default_role: 条件
    fallback: .agents/skills/debugging-and-error-recovery/SKILL.md
    trigger_ref: agent-toolchain.md#execute--条件-skillssot--触发才-read

  diagnosing-bugs:
    path: .claude/skills/diagnosing-bugs/SKILL.md
    phase: DEBUG
    default_role: 条件
    fallback: .agents/skills/debugging-and-error-recovery/SKILL.md
    trigger_ref: agent-toolchain.md#execute--条件-skillssot--触发才-read

  shipping-and-launch:
    path: .agents/skills/shipping-and-launch/SKILL.md
    phase: pre-merge
    default_role: 条件
    trigger_ref: agent-toolchain.md#execute--条件-skillssot--触发才-read

  grill-me:
    path: .claude/skills/grill-me/SKILL.md
    phase: boot
    default_role: 条件
    fallback: .claude/skills/grilling/SKILL.md
    trigger_ref: .trellis/spec/guides/grill-gate.md

  gitnexus-impact:
    path: AGENTS.md
    phase: boot
    default_role: 必做
    note: "Use GitNexus MCP impact(); optional read gitnexus-impact-analysis skill"

boot_required_reads:
  - agent-toolchain
  - trellis-execute
  - trellis-execute-principles
  - project-global
  - gitnexus-impact

red_required_reads:
  - test-driven-development
  - karpathy-guidelines
  - testing-guidelines

green_required_reads:
  - test-driven-development
  - karpathy-guidelines
  - testing-guidelines

slice_required_reads:
  - incremental-implementation

conditional_reads:
  source-driven-development:
    when: "外部 API/契约；见 agent-toolchain.md §Execute 条件 skill 细则 · source-driven-development"
  deprecation-and-migration:
    when: "删除/迁移/双轨；见 agent-toolchain.md §Execute 条件 skill 细则 · deprecation-and-migration"
  observability-and-instrumentation:
    when: "ops/写路径可观测性；见 agent-toolchain.md §Execute 条件 skill 细则 · observability-and-instrumentation"
  systematic-debugging:
    when: "RED/GREEN 异常；见 agent-toolchain.md §Execute 条件 skill 细则 · DEBUG"
  diagnosing-bugs:
    when: "systematic 后仍卡住；见 agent-toolchain.md §Execute 条件 skill 细则 · DEBUG"
  shipping-and-launch:
    when: "Audit PASS 后 merge/PR；见 agent-toolchain.md §Execute 条件 skill 细则 · shipping-and-launch"
  grill-me:
    when: "scope 不清；见 agent-toolchain.md §grill-gate 与 §Execute"
