version: data_cli_contract_v1
status: draft_round2_6
owner: ops
purpose: "Define safe local data sync CLI behavior before adding new command wrappers."
commands:
  qmd data init-basic:
    default_mode: dry_run
    writes_allowed_when_confirmed: [schema, registry]
    docs_anchor: docs/ops/data_init_basic_cli.md
  qmd data sync:
    required_args: [domain]
    optional_args: [start, end, since, dry-run]
    must_use: [ResourceGuard, SourceRoutePlan, idempotency_key, fetch_log]
  qmd data full-load:
    required_args: [domain, source-id, start]
    optional_args: [end, instrument-id, max-shards, truncate-to-cap, dry-run]
    default_mode: dry_run
    must_use:
      [DataSyncOrchestrator.run_full_load, ResourceGuard, SourceRoutePlan]
    docs_anchor: docs/modules/data_sync_orchestrator.md#1341-fullloadjob
  qmd data scheduler run:
    required_args: [profile]
    optional_args: [dry-run]
    default_mode: dry_run
    must_use: [run_profile, bindings_for_source, execute_binding, ResourceGuard]
    docs_anchor: docs/modules/data_sync_orchestrator.md#136-调度计划
  qmd data incremental:
    required_args: [profile]
    optional_args: [dry-run]
    default_mode: dry_run
    must_use: [run_profile, execute_binding]
    docs_anchor: docs/modules/data_sync_orchestrator.md#137-cli-设计
  qmd data revision-audit:
    required_args: [domain, market]
    optional_args: [lookback-days, dry-run]
    default_mode: dry_run
    must_use: [DataSyncOrchestrator.run_revision_audit, ResourceGuard]
    docs_anchor: docs/modules/data_sync_orchestrator.md#137-cli-设计
  qmd data reconcile:
    required_args: [conflict-id]
    optional_args: [dry-run]
    default_mode: dry_run
    must_use: [DataSyncOrchestrator.run_reconcile]
    docs_anchor: docs/modules/data_sync_orchestrator.md#137-cli-设计
  qmd data quality-check:
    required_args: [domain, date]
    optional_args: [dry-run]
    default_mode: dry_run
    must_use: [DataSyncOrchestrator.run_data_quality, ResourceGuard]
    docs_anchor: docs/modules/data_sync_orchestrator.md#137-cli-设计
  qmd data health:
    required_args: [domain, profile]
    optional_args:
      - evidence-dir
      - db-path
      - start
      - end
      - max-rows
      - format
    side_effects_allowed: false
    default_mode: read_only
    must_use: [run_data_health_profile]
    forbidden_args:
      - allow-network
      - clean-write
      - full-market-scan
      - full-history
    output: DataHealthCliEnvelope
  qmd data route-preview:
    side_effects_allowed: false
    output: SourceRoutePlan
rules:
  - dry-run must be available for every command that could write data
  - commands must print route_status and source_used or skip reason
  - no command may enable qmt/qmt_xqshare without explicit user confirmation
  - CLI outputs must include error_code and docs_anchor when failing
required_tests:
  - tests/test_data_cli_contract.py::test_syncDryRunDoesNotWrite
  - tests/test_data_cli_contract.py::test_routePreviewContract_isReadOnly
  - tests/test_data_cli_contract.py::test_dataCliContract_healthCommandDocumented
  - tests/test_qmd_data_cli.py::test_qmdData_syncWithoutDryRun_failsClosed
  - tests/test_qmd_data_cli.py::test_initDb_syncRegistry_oneLiner
  - tests/test_qmd_data_cli.py::test_packaging_consoleScripts_smoke
  - tests/test_qmd_data_cli.py::test_qmdData_health_supportedProfile_notPlaceholder
  - tests/test_qmd_data_cli.py::test_qmdData_health_jsonRequiredFields
  - tests/test_qmd_data_cli.py::test_qmdData_health_invalidProfile_documentedError
  - tests/test_qmd_data_cli.py::test_qmdData_health_invokesProfileRunner
  - tests/test_qmd_data_cli.py::test_qmdData_health_noSideEffects
  - tests/test_qmd_data_cli.py::test_qmdData_health_rejectsLiveCleanWriteFullScan
  - tests/test_qmd_data_cli.py::test_qmdData_health_defaultWindow_boundedRowCount
  - tests/test_qmd_data_full_load_cli.py::test_qmdDataFullLoad_cliRegisteredInDataCliContract
  - tests/test_qmd_data_full_load_cli.py::test_qmd_data_full_load_dry_run_json_auditable
  - tests/test_data_cli_contract.py::test_dataCliContract_schedulerRunRegistered
  - tests/test_data_cli_contract.py::test_dataCliContract_section137CommandsRegistered
  - tests/test_sync_scheduler.py::test_syncScheduler_profileExpandsRegistryToExecuteBinding
