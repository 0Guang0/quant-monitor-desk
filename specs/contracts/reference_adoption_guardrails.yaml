version: reference_adoption_guardrails_v2
status: active_round3fr
owner: architecture_security
purpose: >
  Permit scoped, audited adaptation from mature reference projects while blocking
  unsafe runtime copying, execution semantics, source fallback, and license-risky
  adoption. Execution details belong in the concrete task card that uses the
  reference source; Batch 3F-R and Batch 3G must not move executable adoption
  details into a separate inventory file that execution agents must chase.
  Production-completion plans may exist only as coverage/navigation maps; they
  must not replace task-card-local executable reference details.

adoption_ladder:
  policy_date: "2026-06-27"
  reference_tree_retirement: >
    参考项目/** will be removed from the repo. It must never be a runtime dependency:
    no import, no sys.path, no runtime read of reference paths, no soft-link to
    reference files for execution.
  priority_order:
    - id: L1_direct_copy
      when: logic fits QMD stack and positioning; license and forbidden_semantics pass
      action: copy source into qmd_owned target paths; record reference_project in task card
    - id: L2_copy_and_rewrite
      when: useful but mismatched db paths, calendar, sql, or evidence shape
      action: copy then rewrite to ConnectionManager, registry, gates, structured evidence
    - id: L3_greenfield
      when: no suitable reference or license/semantics forbid adoption
      action: minimal qmd_owned implementation only
  hard_limits:
    - must_match_qmd_stack_and_monitor_desk_positioning
    - no_runtime_reference_project_dependency
    - no_forced_copy_when_architecture_only_or_license_blocks
  task_card_must_record:
    - reference_project.path
    - reference_project.qmd_target_files
    - reference_project.direct_copy_allowed
    - reference_project.rewrite_required

structure_rules:
  task_card_local_reference_details: true
  one_task_id_one_task_card: true
  executable_reference_details_must_be_task_card_local: true
  separate_reference_inventory_may_exist_only_as_non_executable_index: true
  planning_map_may_exist_only_as_non_executable_coverage_map: true
  planning_map_must_not_replace_task_card_local_details: true
  production_completion_coverage_map_file: docs/implementation_tasks/PRODUCTION_COMPLETION_VERTICAL_SLICE_PLAN.md
  downstream_may_cite_production_plan_only_as_coverage_checklist: true
  batch3fr_separate_reference_inventory_allowed: false
  batch3g_separate_reference_inventory_allowed: false
  batch3g_canonical_cards:
    - docs/implementation_tasks/ROUND_3_SANDBOX_CLEAN_WRITE/BATCH_3G_SANDBOX_CLEAN_WRITE/R3G_01_SANDBOX_CLEAN_WRITE_REHEARSAL.md
    - docs/implementation_tasks/ROUND_3_SANDBOX_CLEAN_WRITE/BATCH_3G_SANDBOX_CLEAN_WRITE/R3G_02_PRE_PRODUCTION_ADVERSARIAL_AUDIT.md
    - docs/implementation_tasks/ROUND_3_SANDBOX_CLEAN_WRITE/BATCH_3G_SANDBOX_CLEAN_WRITE/R3G_03_LIMITED_PRODUCTION_CLEAN_WRITE.md

completion_rules:
  max_implementation_batches_to_full_stable: 3
  first_batch_must_be_vertical_slice: true
  rating_authority_file: MODULE_COMPLETION_RATING.md
  design_docs_remain_complete_product_targets: true

license_gate:
  required_task_card_fields:
    - reference_project.path
    - reference_project.license
    - reference_project.allowed_use
    - reference_project.qmd_target_files
    - reference_project.direct_copy_allowed
    - reference_project.rewrite_required
    - reference_project.forbidden_semantics
    - reference_project.attribution_required
  allowed_use_values:
    - direct_adaptation
    - architecture_only
    - forbidden_until_review
  rules:
    - mit_or_apache_may_be_directly_adapted_only_when_card_names_source_and_target_paths
    - agpl_is_architecture_only_unless_separate_legal_decision
    - unknown_license_forbids_runtime_adoption
    - runtime_code_must_be_qmd_owned

allowed_adoption:
  easyxt_data_quality_rules:
    from: EasyXT
    source_paths:
      - 参考项目/EasyXT/data_manager/data_integrity_checker.py
      - 参考项目/EasyXT/data_manager/smart_data_detector.py
    allowed_as:
      - qmd_owned_data_health_profile_rules
      - qmd_owned_missing_calendar_gap_report_shape
      - qmd_owned_data_quality_summary_shape
    required_rewrites:
      - remove_runtime_import_from_reference_project
      - remove_sys_path_mutation
      - remove_default_db_path_lookup
      - remove_hardcoded_table_names
      - remove_interpolated_sql
      - replace_reference_calendar_with_qmd_calendar_or_warning_status
  jq2ptrade_loader_report_shapes:
    from: JQ2PTrade
    source_paths:
      - 参考项目/JQ2PTrade/ptrade_local/engine/data_loader.py
      - 参考项目/JQ2PTrade/ptrade_local/engine/report.py
      - 参考项目/JQ2PTrade/api_mapping.json
    allowed_as:
      - qmd_owned_bounded_rehearsal_loader_shape
      - qmd_owned_structured_rehearsal_report_shape
      - forbidden_api_name_deny_list
    required_rewrites:
      - remove_default_local_database_path
      - remove_broad_universe_loading
      - preserve_raw_source_symbol_identity
      - replace_console_reporting_with_structured_evidence
      - exclude_execution_style_api_names
  openbb_provider_architecture:
    from: OpenBB
    source_paths:
      - 参考项目/OpenBB/openbb_platform/providers/
      - 参考项目/OpenBB/openbb_platform/providers/fred/README.md
    allowed_as:
      - architecture_only_provider_catalog_pattern
      - qmd_owned_provider_metadata_fields
    required_rewrites:
      - no_openbb_runtime_source_copy
      - no_openbb_provider_class_copy
      - no_round3g_openbb_runtime_dependency
  agents_round4_only:
    from:
      - TradingAgents
      - TradingAgents-astock
      - agents-for-openbb
    allowed_as:
      - future_round4_agent_ui_reference_only
    round3g_allowed_use: none

forbidden_adoption:
  runtime_import_from_reference_project:
    examples:
      - 参考项目
      - sys.path.insert
      - sys.path.append
      - import_from_reference_project_runtime
      - sys_path_insert_reference_project
    severity: P0
  real_trading_or_order_api:
    examples:
      - order
      - order_value
      - order_target
      - order_target_value
      - cancel_order
      - buy
      - sell
      - get_open_orders
      - get_portfolio
      - get_positions
      - get_orders
      - get_trades
    severity: P0
  scheduler_or_execution_hook:
    examples:
      - run_daily
      - run_weekly
      - run_monthly
      - arbitrary_strategy_exec
    severity: P0
  auto_login_or_captcha:
    examples:
      - qmt_auto_login
      - captcha_solver
      - terminal_control
    severity: P0
  silent_fallback:
    examples:
      - auto_source_switch_without_flag
      - fallback_without_source_route_log
    severity: P0
  copied_openbb_runtime_source:
    examples:
      - copied_provider_fetcher_class
      - openbb_runtime_dependency_in_round3g
    severity: P0
  round3g_agent_triggered_write:
    examples:
      - agent_triggered_write
      - agent_expanded_candidate_set
      - agent_substituted_user_approval
    severity: P0

round3g_rules:
  - R3G reference adoption details must live in R3G task cards, not in a separate inventory file.
  - R3G-01 may adapt EasyXT/JQ2PTrade/OpenBB ideas only into QMD-owned bounded sandbox rehearsal code.
  - R3G-02 must block if reference code is imported at runtime or copied unsafely.
  - R3G-03 must block without explicit user approval, before/after proof, and rollback dry run.
  - TradingAgents, TradingAgents-astock, and agents-for-openbb have no active Round3G use.

required_tests:
  - tests/test_reference_adoption_guardrails.py::test_r3fr01GuardrailsYamlContract
  - tests/test_reference_adoption_guardrails.py::test_noTradingApiCopied
  - tests/test_reference_adoption_guardrails.py::test_noAutoLoginCopied
  - tests/test_reference_adoption_guardrails.py::test_noSilentFallbackCopied
  - tests/test_reference_adoption_guardrails.py::test_noReferenceProjectRuntimeImport
  - tests/test_reference_adoption_guardrails.py::test_noOpenbbRuntimeCopyIntroduced
  - tests/test_reference_adoption_guardrails.py::test_jq2ptradeSchedulerHookNotCopied
  - tests/test_reference_adoption_guardrails.py::test_jq2ptradeCompileExecPatternNotCopied
  - tests/test_reference_adoption_guardrails.py::test_r3fr04Round4BacktestPlanningClosure
  - tests/test_reference_adoption_guardrails.py::test_noAgentTriggeredWritePatterns
  - tests/test_reference_adoption_guardrails.py::test_noEasyxtHardcodedTableInDataHealth
  - tests/test_reference_adoption_guardrails.py::test_batch3frCardsDoNotRequireCentralInventory
  - tests/test_reference_adoption_guardrails.py::test_r3fr01PlanningWordingAndLooseCardRedirects
  - tests/test_reference_adoption_guardrails.py::test_productionCompletionPlanIsCoverageMapOnly
  - tests/test_reference_adoption_guardrails.py::test_r3fr01DownstreamCardsGovernanceBoundaries
  - tests/test_reference_adoption_guardrails.py::test_r3frAdaptingCardsDeclareReferenceProject
  - tests/test_reference_adoption_guardrails.py::test_r3fr05ProviderCatalogClosure
