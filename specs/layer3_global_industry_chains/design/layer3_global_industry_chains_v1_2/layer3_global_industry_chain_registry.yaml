version: "1.2"
generated_date: "2026-06-16"
layer: Layer 3 - Global Industry Chain Shock-Anchor Layer
purpose_cn: 在v1.1轻量root node方案基础上升级为方案B：为每条chain补充功能节点与有向传导边，并优先补齐P0锚点来源。
design_principles_cn:
  - 第三层不做全量股票池；全量行情与财务仍在Layer 5。
  - 每个锚点必须标注地位(anchor_tier)和作用(anchor_role)，避免NVIDIA与普通映射股同级。
  - 私有公司、监管机构、商品/指数可以作为事件锚或价格锚，但不能当成普通股票行情锚。
  - P0只放AI基础设施核心链；非AI全球链保留为P1/P2，避免第三层过度膨胀。
  - 前端默认展示核心震动锚、扩散锚、事件锚、商品/指数锚、区域映射五类。
  - v1.2执行方案B：每条chain不只保留root node，还要有功能节点、链内边和AI主链跨链传导边。
anchor_tier_dictionary:
  A_GLOBAL_DOMINANT: 全球绝对统治型/定价型锚点。单家公司或变量的财报、产能、路线图、限制政策足以影响全球产业链资金重定价。
  A_CAPEX_SETTER: 资本开支总开关。它不是供应商，但决定AI基础设施花多少钱、买多少算力、建多少数据中心。
  B_OLIGOPOLY_ANCHOR: 寡头型资金锚。行业中少数几家公司共同影响资金流向，没有单一绝对统治者。
  B_SUPPLY_CHAIN_BETA: 供应链高弹性锚。对产业链景气度反应快、波动大，适合监控主题扩散。
  C_PRIVATE_EVENT_ANCHOR: 私有公司/不可直接交易事件锚。融资、产品、订单或合作能影响市场，但不是常规行情标的。
  D_COMMODITY_PROXY: 商品/期货/指数价格锚。通过价格或运价直接反映供需约束。
  E_REGIONAL_PROXY: 区域市场映射锚。主要反映A股、港股、韩股、日股等局部市场弹性，全球统治力不足。
