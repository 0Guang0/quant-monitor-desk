# Plan Skill 路径 — Plan agent Read 必须使用本表（禁止读错同名 skill）
# Plan 冻结时 skill 名写入 plan.freeze.md §1「路径」列

version: "1"

skills:
  trellis-plan:
    path: .cursor/skills/trellis-plan/SKILL.md
    phase: boot
    default_role: 必做

  gitnexus-plan-1a:
    path: AGENTS.md
    phase: "1a"
    default_role: 必做
    note: "GitNexus MCP query + context；轻量概览 → project-overview.md"

  trellis-brainstorm:
    path: .cursor/skills/trellis-brainstorm/SKILL.md
    phase: "2a"
    default_role: 必做

  spec-driven-development:
    path: .claude/plugins/cache/addy-agent-skills/agent-skills/3a6fc6392823/skills/spec-driven-development/SKILL.md
    phase: "2b"
    default_role: 必做

  domain-modeling:
    path: .claude/skills/domain-modeling/SKILL.md
    phase: "2"
    default_role: 条件
    note: "项目缺少 CONTEXT.md 或领域术语模糊时启用"

  grill-me:
    path: .claude/skills/grill-me/SKILL.md
    phase: "3"
    default_role: 条件
    note: "grill-me OR interview-me OR grill-with-docs — 必须选一"

  interview-me:
    path: .claude/plugins/cache/addy-agent-skills/agent-skills/3a6fc6392823/skills/interview-me/SKILL.md
    phase: "3"
    default_role: 条件

  grill-with-docs:
    path: .claude/skills/grill-with-docs/SKILL.md
    phase: "3"
    default_role: 条件
    note: "更强替代：以 CONTEXT.md/ADR 为锚点质问"

  to-issues:
    path: .claude/skills/to-issues/SKILL.md
    phase: "3.5"
    default_role: 必做
    note: "需求垂直切片 → 切片工单列表"

  gitnexus-plan-1b:
    path: AGENTS.md
    phase: "1b"
    default_role: 必做
    note: "GitNexus MCP query + impact + context；需求锚定深度分析 → gitnexus-summary.md"

  brainstorming:
    path: .claude/plugins/cache/claude-plugins-official/superpowers/5.1.0/skills/brainstorming/SKILL.md
    phase: "4"
    default_role: 条件

  api-and-interface-design:
    path: .claude/plugins/cache/addy-agent-skills/agent-skills/3a6fc6392823/skills/api-and-interface-design/SKILL.md
    phase: "4"
    default_role: 条件

  codebase-design:
    path: .claude/skills/codebase-design/SKILL.md
    phase: "4"
    default_role: 条件
    note: "设计新模块接口或深度重构时启用"

  prototype:
    path: .claude/skills/prototype/SKILL.md
    phase: "4"
    default_role: 条件
    note: "高风险设计项需可丢弃原型验证时启用"

  planning-and-task-breakdown:
    path: .claude/plugins/cache/addy-agent-skills/agent-skills/3a6fc6392823/skills/planning-and-task-breakdown/SKILL.md
    phase: "5a"
    default_role: 必做

  writing-plans:
    path: .claude/plugins/cache/claude-plugins-official/superpowers/5.1.0/skills/writing-plans/SKILL.md
    phase: "5b"
    default_role: 必做

  trellis-before-dev:
    path: .cursor/skills/trellis-before-dev/SKILL.md
    phase: "5c"
    default_role: 必做

  doubt-driven-development:
    path: .claude/plugins/cache/addy-agent-skills/agent-skills/3a6fc6392823/skills/doubt-driven-development/SKILL.md
    phase: "5d"
    default_role: 必做

phases:
  boot:
    skills: [trellis-plan]
    artifacts:
      - research/plan-boot.md
    marker: "Phase P0 complete"

  "1a":
    skills: [gitnexus-plan-1a]
    artifacts:
      - research/project-overview.md

  "2a":
    skills: [trellis-brainstorm]
    artifacts:
      - prd.md

  "2b":
    skills: [spec-driven-development]

  "3":
    skills_any: [grill-me, interview-me, grill-with-docs]
    artifacts_any:
      - research/grill-me-session.md
      - research/interview-me-session.md
      - research/grill-with-docs-session.md

  "3.5":
    skills: [to-issues]
    note: "产出切片工单列表（≥1 个垂直切片）；to-issues 无独立 artifact 文件"

  "1b":
    skills: [gitnexus-plan-1b]
    artifacts:
      - research/gitnexus-summary.md

  "4":
    skills_any: [brainstorming, api-and-interface-design, codebase-design, prototype]

  "5a":
    skills: [planning-and-task-breakdown]

  "5b":
    skills: [writing-plans]

  "5c":
    skills: [trellis-before-dev]
    artifacts:
      - implement.jsonl

  "5d":
    skills: [doubt-driven-development]

freeze_required_skills:
  - trellis-plan
  - gitnexus-plan-1a
  - trellis-brainstorm
  - spec-driven-development
  - to-issues
  - gitnexus-plan-1b
  - planning-and-task-breakdown
  - writing-plans
  - trellis-before-dev
  - doubt-driven-development

freeze_phase3_one_of:
  - grill-me
  - interview-me
  - grill-with-docs

boot_marker: "Phase P0 complete"
