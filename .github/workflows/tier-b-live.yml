name: Tier B Live Acceptance

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:
    inputs:
      quick:
        description: "Run yahoo_finance + akshare smoke only"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: tier-b-live-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tier-b-live-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Tier B live acceptance --report
        id: acceptance
        env:
          QMD_ALLOW_LIVE_FETCH: "1"
          THS_IFIND_LICENSE_ARTIFACT: ${{ secrets.THS_IFIND_LICENSE_ARTIFACT }}
          QMT_XTDATA_AUTHORIZED: ${{ secrets.QMT_XTDATA_AUTHORIZED }}
          QMT_XQSHARE_AUTHORIZED: ${{ secrets.QMT_XQSHARE_AUTHORIZED }}
          XQSHARE_REMOTE_HOST: ${{ secrets.XQSHARE_REMOTE_HOST }}
          XQSHARE_REMOTE_PORT: ${{ secrets.XQSHARE_REMOTE_PORT }}
        run: |
          RUN_ID="ci-${{ github.run_id }}"
          DATA_ROOT=".audit-sandbox/m-data-03/tier-b/${RUN_ID}"
          mkdir -p "${DATA_ROOT}"
          REPORT="${DATA_ROOT}/tier-b-report.json"
          ARGS=(--report "${REPORT}" --data-root "${DATA_ROOT}")
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.quick }}" = "true" ]; then
            ARGS+=(--quick)
          fi
          python scripts/tier_b_live_acceptance.py "${ARGS[@]}"
      - name: Upload tier_b_live_acceptance failure artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tier-b-live-failure-${{ github.run_id }}
          path: |
            .audit-sandbox/m-data-03/tier-b/**/tier_b_live_acceptance_failure_*.json
            .audit-sandbox/m-data-03/tier-b/**/tier-b-report.json
          if-no-files-found: warn
