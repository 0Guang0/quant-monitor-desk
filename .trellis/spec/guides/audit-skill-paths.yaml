# Audit Skill 路径 — 主会话 + A1–A8 派发

# Plan 复制任务 AUDIT.plan.md；维度派发见 agents/ 下可派发模板

# 派发纪律：复杂任务 MUST 一维一 agent（注入对应 agents/*.md 模板），禁止单 agent 串演 A1–A8

# 协议：Plan v4.1（plan_protocol_version: "4.1"）— Boot SSOT: agents/audit-boot-v4.1.md

version: "1.2"

# 对抗性审计权威 — 全员派发 MUST Read（ENTRY/INDEX 仅参考）

audit_authority:
  preamble: agents/audit-adversarial-authority.md

  boot: agents/audit-boot-v4.1.md

  finding_schema: agents/audit-finding-schema.md

  coverage_model: agents/audit-coverage-model.md

  tier1: [design_docs, rules_contracts]

  tier2: [execution_bundle, agent_template, original_task_card]

  tier3:
    [
      EXECUTION_INDEX.md,
      frozen_card,
      audit_jsonl,
      AUDIT.plan.md_trace_authority,
    ]

  reference_only: [implement.jsonl_manifest, prior_audit_report]

  assumption: "Execution Bundle 可能存在缺口；须对抗性找计划外风险"

skills:
  agent-toolchain:
    path: agent-toolchain.md

    phase: boot

    default_role: 必做

    note: "场景工具路由；全员必读（根目录）"

  audit-coverage-model:
    path: agents/audit-coverage-model.md

    phase: boot

    default_role: 必做

    note: "两条链·三类缺口；Audit only"

boot_required_reads:
  - agent-toolchain

  - agents/audit-adversarial-authority.md

  - agents/audit-boot-v4.1.md

  - agents/audit-finding-schema.md

  - agents/audit-coverage-model.md

orchestrator_reads:
  - .trellis/spec/guides/templates/AUDIT.plan.md

  - .trellis/spec/guides/templates/audit-repair-ledger.md

  - agents/audit-boot-v4.1.md

  - audit.jsonl

  - research/00-EXECUTION-ENTRY.md

  - EXECUTION_INDEX.md

dimensions:
  A1:
    agent: audit-spec

    template: agents/audit-a1-spec.md

    skills: [trellis-check, doubt-driven-development]

    gitnexus: 必用

  A2:
    agent: audit-ponytail

    template: agents/audit-a2-ponytail.md

    skills: [ponytail-review, doubt-driven-development]

    gitnexus: 建议

  A3:
    agent: audit-security

    template: agents/security-auditor.md

    also_read: [agents/sql-pro.md]

    skills: [security-and-hardening, doubt-driven-development]

    gitnexus: 必用

  A4:
    agent: audit-quality

    template: agents/code-reviewer.md

    skills: [code-review-and-quality, doubt-driven-development]

    gitnexus: 建议

  A5:
    agent: audit-completion

    template: agents/audit-a5-completion.md

    also_read: [agents/quant-analyst.md, agents/risk-manager.md]

    skills: [verification-before-completion, doubt-driven-development]

    gitnexus: 必用

  A6:
    agent: audit-perf

    template: agents/performance-engineer.md

    skills: []

    gitnexus: 必用

    note: "无性能要求时 Plan 标 SKIP"

  A7:
    agent: audit-ops

    template: agents/database-administrator.md

    also_read: [agents/sre-engineer.md, agents/devops-incident-responder.md]

    skills: [doubt-driven-development]

    gitnexus: 必用

  A8:
    agent: audit-test-gap

    template: agents/qa-expert.md

    also_read: [agents/test-automator.md]

    skills: [testing-guidelines, doubt-driven-development]

    gitnexus: 必用
