name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q -n auto --cov=backend --cov-fail-under=85
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m compileall backend scripts tests
      - run: python scripts/production_gate.py
      - name: Batch A prod-path ingestion smoke (Tier B)
        env:
          QMD_DATA_ROOT: .audit-sandbox/data
        run: python scripts/ci_ingestion_smoke.py
      - name: Perf budget artifact (bounded audit-sandbox)
        env:
          QMD_DATA_ROOT: .audit-sandbox/r3b275-audit
        run: python scripts/ci_perf_budget_artifact.py
      - name: Block WriteManager imports in datasources
        run: |
          if grep -riE 'WriteManager|write_manager' backend/app/datasources/ 2>/dev/null; then
            echo "WriteManager import forbidden under backend/app/datasources/"
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
