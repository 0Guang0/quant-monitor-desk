version: data_cli_contract_v1
status: frozen
owner: ops
purpose: "Define safe local data sync CLI behavior before adding new command wrappers."
commands:
  qmd data init-basic:
    default_mode: dry_run
    writes_allowed_when_confirmed: [schema, registry]
    docs_anchor: docs/ops/data_init_basic_cli.md
  qmd data sync:
    required_args: [domain]
    optional_args: [start, end, since, dry-run]
    must_use: [ResourceGuard, SourceRoutePlan, idempotency_key, fetch_log]
  qmd data full-load:
    required_args: [domain, source-id, start]
    optional_args: [end, instrument-id, max-shards, truncate-to-cap, dry-run]
    default_mode: dry_run
    must_use:
      [DataSyncOrchestrator.run_full_load, ResourceGuard, SourceRoutePlan]
    docs_anchor: docs/modules/design/data_sync_orchestrator.md#1341-fullloadjob
  qmd data scheduler run:
    required_args: [profile]
    optional_args: [dry-run]
    default_mode: dry_run
    must_use: [run_profile, bindings_for_source, execute_binding, ResourceGuard]
    docs_anchor: docs/modules/design/data_sync_orchestrator.md#136-调度计划
  qmd data incremental:
    required_args: [profile]
    optional_args: [dry-run]
    default_mode: dry_run
    must_use: [run_profile, execute_binding]
    docs_anchor: docs/modules/design/data_sync_orchestrator.md#137-cli-设计
  qmd data revision-audit:
    required_args: [domain, market]
    optional_args: [lookback-days, dry-run]
    default_mode: dry_run
    must_use: [DataSyncOrchestrator.run_revision_audit, ResourceGuard]
    docs_anchor: docs/modules/design/data_sync_orchestrator.md#137-cli-设计
  qmd data reconcile:
    required_args: [conflict-id]
    optional_args: [dry-run]
    default_mode: dry_run
    must_use: [DataSyncOrchestrator.run_reconcile]
    docs_anchor: docs/modules/design/data_sync_orchestrator.md#137-cli-设计
  qmd data quality-check:
    required_args: [domain, date]
    optional_args: [dry-run]
    default_mode: dry_run
    must_use: [DataSyncOrchestrator.run_data_quality, ResourceGuard]
    docs_anchor: docs/modules/design/data_sync_orchestrator.md#137-cli-设计
  qmd data health:
    required_args: [domain, profile]
    optional_args:
      - evidence-dir
      - db-path
      - start
      - end
      - max-rows
      - format
    side_effects_allowed: false
    default_mode: read_only
    must_use: [run_data_health_profile]
    forbidden_args:
      - allow-network
      - clean-write
      - full-market-scan
      - full-history
    output: DataHealthCliEnvelope
  qmd data route-preview:
    side_effects_allowed: false
    output: SourceRoutePlan
phase1_gate:
  acceptance_authority: SourceRouteDbAcceptanceSpine
  production_equivalent_data_root_segment: source-route-db
  gate_eligible_requires:
    - official qmd-data data sync|backfill|full-load|scheduler command
    - QMD_DATA_ROOT under .audit-sandbox/source-route-db
    - live run (not dry-run)
  non_gate_evidence:
    - dry_run
    - replay
    - mock
    - not_implemented
    - generic .audit-sandbox without source-route-db segment
    - sandbox-clean-write
    - limited_production_entry
  current_runtime_seams:
    production_equivalent_data_root_segment: source-route-db
    prod_source_tier_module: backend.app.datasources.live_prod_source_tiers
    incremental_gold_path_source_ids: INCREMENTAL_GOLD_PATH_SOURCE_IDS
    domain_fetch_operation: domain_fetch_operation
    acceptance_request_builder: acceptance_request_for_domain
  acceptance_seam_contract: specs/contracts/source_route_db_acceptance_contract.yaml
  official_commands_must_expose:
    - acceptance_report
    - gate_eligible
    - report_version
    - run_id
    - job_kind
    - observability_evidence
    - failure_class
  required_error_fields:
    - error_code
    - message
    - docs_anchor
  failure_class_values:
    - NONE
    - BLOCKED
    - FAIL_EXTERNAL
    - CONTRACT_VIOLATION
    - FAIL
  retired_commands:
    - command: qmd data sandbox-clean-write
      subcommands: [rehearse, audit, promote]
      error_code: LEGACY_COMMAND_RETIRED
      replacement: qmd-data data sync|backfill|full-load|scheduler with QMD_DATA_ROOT under .audit-sandbox/source-route-db
      gate_eligible: false
    - command: retired ops live acceptance harness wrappers
      note: historical Tier harness CLI; scripts removed per ADR-015
      error_code: LEGACY_COMMAND_RETIRED
      replacement: scripts/qmd_ops.py accept-source-route-db or official qmd-data data commands with QMD_DATA_ROOT under .audit-sandbox/source-route-db
      gate_eligible: false
  legacy_seam_inventory_script: scripts/check_acceptance_helper_consumers.py
rules:
  - dry-run must be available for every command that could write data
  - commands must print route_status and source_used or skip reason
  - no command may enable qmt/qmt_xqshare without explicit user confirmation
  - CLI outputs must include error_code and docs_anchor when failing
  - Phase 1 P1-GATE requires production-equivalent acceptance report; dry-run/replay/mock are non-gate
required_tests:
  - tests/test_data_cli_contract.py::test_dataCliContract_phase1GateDocumented
  - tests/test_data_cli_contract.py::test_dataCliContract_officialCommandsExposeAcceptanceFields
  - tests/test_data_cli_contract.py::test_dataCliContract_legacyInventoryListed
  - tests/test_qmd_data_acceptance_envelope.py::test_phase1Acceptance_gateEligible_onlyForSourceRouteDbLive
  - tests/test_qmd_data_sync_acceptance.py::test_qmdData_syncAcceptance_sourceRouteDbLiveWithoutAuthBlocked
  - tests/test_qmd_data_backfill_acceptance.py::test_qmdData_backfillAcceptance_sourceRouteDbLiveBlockedWithoutAuth
  - tests/test_qmd_data_full_load_acceptance.py::test_qmdData_fullLoadAcceptance_macroDomainDryRunNonPilot
  - tests/test_sync_scheduler_acceptance.py::test_syncSchedulerAcceptance_dryRunParentChildEnvelope
  - tests/test_data_cli_contract.py::test_syncDryRunDoesNotWrite
  - tests/test_data_cli_contract.py::test_routePreviewContract_isReadOnly
  - tests/test_data_cli_contract.py::test_dataCliContract_healthCommandDocumented
  - tests/test_qmd_data_cli.py::test_qmdData_syncWithoutDryRun_failsClosed
  - tests/test_qmd_data_cli.py::test_initDb_syncRegistry_oneLiner
  - tests/test_qmd_data_cli.py::test_packaging_consoleScripts_smoke
  - tests/test_qmd_data_cli.py::test_qmdData_health_supportedProfile_notPlaceholder
  - tests/test_qmd_data_cli.py::test_qmdData_health_jsonRequiredFields
  - tests/test_qmd_data_cli.py::test_qmdData_health_invalidProfile_documentedError
  - tests/test_qmd_data_cli.py::test_qmdData_health_invokesProfileRunner
  - tests/test_qmd_data_cli.py::test_qmdData_health_noSideEffects
  - tests/test_qmd_data_cli.py::test_qmdData_health_rejectsLiveCleanWriteFullScan
  - tests/test_qmd_data_cli.py::test_qmdData_health_defaultWindow_boundedRowCount
  - tests/test_qmd_data_full_load_cli.py::test_qmdDataFullLoad_cliRegisteredInDataCliContract
  - tests/test_qmd_data_full_load_cli.py::test_qmd_data_full_load_dry_run_json_auditable
  - tests/test_data_cli_contract.py::test_dataCliContract_schedulerRunRegistered
  - tests/test_data_cli_contract.py::test_dataCliContract_section137CommandsRegistered
  - tests/test_sync_scheduler.py::test_syncScheduler_profileExpandsRegistryToExecuteBinding
