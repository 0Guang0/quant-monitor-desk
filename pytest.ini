[pytest]
testpaths = tests
pythonpath = .
addopts = -q
markers =
    slow: integration or full-pipeline tests; exclude with pytest -m "not slow" for quick CI
    network: live vendor fetch tests; skipped unless --run-network
    resourceguard: uses real ResourceGuard; skip autouse OK mock in layer2 loader tests
    host_resource: depends on host memory/disk; may flake in constrained CI
    perf: performance-budget or timing-sensitive tests; may run in quick CI
    perf_gate: opt-in wall-clock suite budget; requires QMD_PERF_GATE=1
