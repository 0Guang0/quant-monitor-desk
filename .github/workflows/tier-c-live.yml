name: Tier C Live Acceptance

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      quick:
        description: "Run kalshi + polymarket smoke only"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: tier-c-live-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tier-c-live-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Tier C live acceptance --report
        id: acceptance
        env:
          QMD_ALLOW_LIVE_FETCH: "1"
          KALSHI_API_KEY: ${{ secrets.KALSHI_API_KEY }}
        run: |
          RUN_ID="ci-${{ github.run_id }}"
          DATA_ROOT=".audit-sandbox/m-data-03/tier-c/${RUN_ID}"
          mkdir -p "${DATA_ROOT}"
          REPORT="${DATA_ROOT}/tier-c-report.json"
          ARGS=(--report "${REPORT}" --data-root "${DATA_ROOT}")
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.quick }}" = "true" ]; then
            ARGS+=(--quick)
          fi
          python scripts/tier_c_live_acceptance.py "${ARGS[@]}"
      - name: Upload tier_c_live_acceptance failure artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tier-c-live-failure-${{ github.run_id }}
          path: |
            .audit-sandbox/m-data-03/tier-c/**/tier_c_live_acceptance_failure_*.json
            .audit-sandbox/m-data-03/tier-c/**/tier-c-report.json
          if-no-files-found: warn
