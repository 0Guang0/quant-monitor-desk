version: 1
module: agent_module
authoritative_doc: docs/modules/agent_module.md
allowed_agents:
  - daily_report_agent
  - news_event_agent
  - announcement_agent
  - layer1_interpretation_agent
  - cross_layer_explain_agent
  - data_quality_explain_agent
  - strategy_review_agent
allowed_tools:
  - get_layer1_snapshot
  - get_layer2_snapshot
  - get_layer3_chain_snapshot
  - get_layer4_market_snapshot
  - get_layer5_security_evidence
  - get_data_quality_summary
  - get_source_conflict_summary
  - get_report_context
forbidden_tools:
  - execute_arbitrary_sql
  - write_duckdb_directly
  - fetch_web_directly
  - modify_source_registry_directly
  - modify_clean_table_directly
output_requirements:
  schema_version_required: true
  facts_used_required: true
  no_action_semantics_guard_required: true
  missing_evidence_required_when_context_incomplete: true
forbidden_action_terms:
  - 买入
  - 卖出
  - 加仓
  - 减仓
  - 满仓
  - 清仓
  - 入场
  - 出场
  - 抄底
  - 逃顶
reference_adoption:
  policy: >
    Agent/UI artifact design may study agents-for-openbb and OpenBB Workspace
    integration examples for artifact shape, citations, widget context, and
    reasoning-step presentation. Reference agent code must not become a factual
    data source, must not bypass QMD tools, and must not initiate writes.
  allowed_reference_paths:
    agents_for_openbb:
      - 参考项目/agents-for-openbb/README.md
      - 参考项目/agents-for-openbb/31-vanilla-agent-reasoning-steps/
      - 参考项目/agents-for-openbb/32-vanilla-agent-raw-widget-data-citations/
      - 参考项目/agents-for-openbb/39-vanilla-agent-html-artifacts/
  forbidden_reference_semantics:
    - agent_as_fact_source
    - direct_adapter_construction
    - candidate_scope_expansion
    - write_trigger

write_boundary:
  direct_clean_table_write: false
  staging_then_validator_then_writemanager: true

user_decision_D12:
  status: confirmed
  allowed_text_sources:
    - fixed_source_adapter
    - user_manual_import
    - registered_local_file
  forbidden_sources:
    - agent_free_web_search
    - unknown_webpage_browsing
    - llm_generated_fact_override
  requires_evidence_ids: true

# user_decision_tag_D-12
# D-12: Agent 只允许固定 source adapter、用户手动导入文本和已登记本地文件；禁止自由联网搜索。
