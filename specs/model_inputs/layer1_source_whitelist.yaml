version: model_input_whitelist_v1
layer: layer1
description: >
  Layer1 macro/risk-axis first-batch model input whitelist.
  P0 FRED series are sandbox_candidate only; requires user authorization before live fetch.
  macro_supplementary (akshare) is validation-only and must not substitute FRED primary.
rows:
  - input_id: L1-ENV-DGS10
    layer: layer1
    business_purpose: ENV-E1-DGS10 10年期名义美债收益率状态锚
    data_domain: us_macro_series
    source_id: fred
    operation: fetch_macro_series
    role: primary_candidate
    readiness: sandbox_candidate
    symbol_or_series: DGS10
    window_cap: 252d
    row_cap: 500
    requires_user_authorization: true
    allowed_next_gate: raw_staging_pilot
    forbidden_claims:
      - production-live ready
      - macro_supplementary substitute
    closure_test: B01-FRED sandbox pilot with authorization YAML
    notes: ENV-E1-DGS10；须用户授权后 live；非 macro_supplementary

  - input_id: L1-ENV-T10Y3M
