name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  network-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Live pilot network subset (ACC-LIVE-NETWORK-CI-001)
        env:
          QMD_DATA_ROOT: .audit-sandbox/nightly-network
          QMD_ALLOW_LIVE_FETCH: "1"
        run: >-
          pytest -q --run-network -m network
          tests/test_batch275_live_pilot_gate.py::test_livePilot_phase3RawOnly_threeRequestsLive
      - name: Wave3 live acceptance with findings gate (ACC-LIVE-ACCEPT-NIGHTLY-001)
        env:
          QMD_DATA_ROOT: .audit-sandbox/nightly-live-accept
          QMD_ALLOW_LIVE_FETCH: "1"
        run: >-
          python scripts/wave3_live_production_acceptance.py
          --fail-on-severity HIGH,CRITICAL
