acceptance_report:
  format: json
  command: scripts/tier_b_live_acceptance.py
  required_top_level_fields:
    - command
    - schema_version
    - data_root
    - generated_at
    - sources
    - summary
  per_source_row_fields:
    - source_id
    - disposition
    - failure_class
    - failure_detail
    - adr_ref
    - fetch_status
    - e2_inspect_status
    - f0_health_status
    - b2_validation_status
    - health_domain
    - health_profile_id
    - rule_set_id
    - clean_table
    - evidence_manifest_path
    - fetch_provenance
  summary_fields:
    - total
    - passed
    - failed_fixable
    - failed_external
  exit_codes:
    0: all sources PASS or FAIL_EXTERNAL with merged ADR
    1: any FAIL_FIXABLE or FAIL_EXTERNAL without ADR
    2: invalid environment
  failure_artifact:
    filename_pattern: tier_b_live_acceptance_failure_{run_id}.json
    required_when: exit_code != 0
