version: sync_scheduler_profiles_v1
status: draft
purpose: "Host cron triggers qmd data scheduler run --profile NAME only (OQ-1A)."
profiles:
  daily_close:
    description: "CN_A bars + Layer1 macro_series daily incremental"
    jobs:
      - job_type: incremental
        domain: cn_equity_daily_bar
        source_id: baostock
        core: true
      - job_type: incremental
        domain: macro_series
        source_id: fred
        core: true
      - job_type: revision_audit
        domain: macro_series
        source_id: fred
        core: false
        lookback_days: 90
  weekly_backfill:
    description: "Bounded backfill + full-load window sample for P1-GATE scheduler evidence"
    jobs:
      - job_type: backfill
        domain: macro_series
        source_id: fred
        date_start: "2024-01-01"
        date_end: "2024-01-31"
        core: true
      - job_type: full_load
        domain: cn_equity_daily_bar
        source_id: baostock
        date_start: "2024-01-01"
        date_end: "2024-01-15"
        core: true
