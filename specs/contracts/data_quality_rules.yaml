common_rules:
  - id: MISSING_PRIMARY_KEY
    severity: failed
  - id: DUPLICATE_PRIMARY_KEY
    severity: failed
  - id: MISSING_REQUIRED_FIELD
    severity: failed_or_warning
  - id: MISSING_TIMESTAMP
    severity: failed
  - id: INVALID_ENUM
    severity: failed
  - id: SCHEMA_DRIFT
    severity: failed
  - id: CONTENT_CHANGED
    severity: warning
  - id: STALE_DATA
    severity: warning
  - id: INSUFFICIENT_HISTORY
    severity: warning
market_bar_rules:
  - id: MISSING_TRADING_DAY
    condition: expected trading day absent from bars (no official calendar → warn)
    severity: warning
  - id: MISSING_REQUIRED_OHLCV_FIELD
    condition: open/high/low/close/volume null or missing
    severity: failed
  - id: NON_POSITIVE_PRICE
    condition: any OHLC field <= 0
    severity: failed
  - id: INVALID_OHLC
    condition: high < low or OHLC relation invalid
    severity: failed
  - id: EXTREME_RETURN
    condition: day-over-day absolute return above threshold
    severity: warning
  - id: VOLUME_OUTLIER
    condition: volume exceeds median ratio threshold
    severity: warning
  - id: DUPLICATE_PRIMARY_KEY
    condition: duplicate symbol|trade_date
    severity: failed
  - id: MISSING_SOURCE_USED
    condition: lineage entry missing source_used
    severity: failed
  - id: INVALID_PRICE_RANGE
    condition: high < low
    severity: failed
  - id: NEGATIVE_PRICE
    condition: any price field < 0
    severity: failed
  - id: INVALID_VOLUME
    condition: volume < 0
    severity: failed
layer1_rules:
  - id: MISSING_SOURCE_USED
    severity: failed
  - id: FALLBACK_WITHOUT_REASON
    severity: failed
  - id: BLINDSPOT_SHOULD_NOT_HAVE_VALUE
    severity: failed
layer3_rules:
  - id: DUPLICATE_ANCHOR_ID
    severity: failed
  - id: MISSING_NODE_REFERENCE
    severity: failed
  - id: P0_MISSING_SOURCE_KEYS
    severity: failed
