version: source_registry_v1
source_role_model: Primary / Validation / FallbackPolicy
updated_for: implementation_docs_audit_remediation_v1
rules:
  user_decision_D11: qmt_xtdata_default_disabled_until_user_confirms_local_authorization
  legacy_roles_forbidden:
    - Shadow
    - Emergency
    - shadow_source
    - emergency_source
  source_id_must_match_adapter_source_id: true
  validation_source_must_be_enabled: true
  validation_source_must_support_domain: true
  unknown_license_cannot_be_primary: true
  yaml_type_strict: true
  domain_roles_must_respect_enabled_by_default: true
  disabled_domain_must_return: DISABLED_SOURCE
sources:
  - source_id: qmt_xtdata
    source_name: QMT xtdata / miniQMT
    source_type: broker_terminal
    license_type: user_local_authorized
    enabled_by_default: false
    trust_level: 90
    allowed_domains:
      - cn_equity_realtime
      - cn_equity_minute_bar
      - cn_equity_daily_bar
    default_role: Primary
    validation_only: false
    rate_limit_policy: local_terminal
    requires_user_setup: true
    notes: 正式启用前必须由用户确认本机 QMT 授权和账号环境。
  - source_id: baostock
    source_name: baostock
    source_type: public_market_data
    license_type: public_free
    enabled_by_default: true
    trust_level: 70
    allowed_domains:
      - cn_equity_daily_bar
      - cn_equity_basic_financial
    default_role: Primary
    validation_only: false
    rate_limit_policy: polite_daily_batch
    requires_user_setup: false
    notes: 适合作为 A 股历史日线与基础财务第一阶段主源之一。Batch 01 SP3 v3 staged expand sample (merge 1a099e8d); sandbox_candidate readiness.
  - source_id: akshare
    source_name: AkShare
    source_type: aggregator
    license_type: public_free_aggregator
    enabled_by_default: true
    trust_level: 60
    allowed_domains:
      - cn_equity_daily_bar
      - cn_index
      - sector_board
      - macro_supplementary
    default_role: Validation
    validation_only: true
    rate_limit_policy: polite_batch_with_cache
    requires_user_setup: false
    notes: 聚合源只能带 source_used 与 quality_flags；不得作为唯一事实源。Batch 01 SP3 v3 validation-only re-defer (R3-PROMPT14-AKSHARE-VAL-01 open).
  - source_id: cninfo
    source_name: 巨潮资讯 CNINFO
    source_type: filing_announcement
    license_type: public_official
    enabled_by_default: true
    trust_level: 85
    allowed_domains:
      - cn_filings
      - cn_announcements
      - cn_pdf_reports
    default_role: Primary
    validation_only: false
    rate_limit_policy: polite_document_fetch
    requires_user_setup: false
    notes: 公告和财报 PDF 原文优先来源。Batch 01 SP3 v3 metadata expand sample (merge 1a099e8d); sandbox_candidate readiness.
  - source_id: yahoo_finance
    source_name: Yahoo Finance / yfinance-compatible access
    source_type: public_market_data
    license_type: public_terms_sensitive
    enabled_by_default: false
    trust_level: 55
    allowed_domains:
      - us_equity_daily_bar
      - etf_daily_bar
      - us_option_chain
      - global_asset_reference
    default_role: Validation
    validation_only: true
    rate_limit_policy: cache_first_low_frequency
    requires_user_setup: false
    notes: 仅作研究/补充验证；生产不可作为唯一主源。
  - source_id: tdx_pytdx
    source_name: TDX / pytdx compatible market data
    source_type: public_market_data
    license_type: public_free
    enabled_by_default: false
    trust_level: 50
    allowed_domains:
      - security_list
      - cn_equity_daily_bar
      - cn_index_daily_bar
    default_role: Validation
    validation_only: true
    rate_limit_policy: polite_batch
    requires_user_setup: false
    notes: Batch 01 B01-TDX mocked PROBE_PASS_RAW_ONLY; live PROBE_REDEFERRED; 018C disabled-by-default validation-only probe.
  - source_id: fred
    source_name: Federal Reserve Economic Data (FRED)
    source_type: vendor_api
    license_type: public_official
    enabled_by_default: false
    trust_level: 80
    allowed_domains:
      - macro_series
    default_role: Primary
    validation_only: false
    rate_limit_policy: polite_api_with_key
    requires_user_setup: true
    notes: Batch 01 B01-FRED sandbox-candidate (merge 9ae91648); disabled-by-default; FRED-only sandbox evidence recorded; live primary B2.5-O-05 RE-DEFERRED Batch 6.
  - source_id: us_treasury
    source_name: US Treasury / FiscalData
    source_type: official_api
    license_type: public_official
    enabled_by_default: false
    trust_level: 95
    allowed_domains:
      - us_treasury_yield_curve
      - inflation_expectation
    default_role: Primary
    validation_only: false
    rate_limit_policy: polite_api_with_cache
    requires_user_setup: false
    official_api: true
    notes: 美国国债收益率曲线与通胀预期官方主源；新增 adapter 前默认禁用，启用后可作为利率曲线 primary。
  - source_id: sec_edgar
    source_name: SEC EDGAR data APIs
    source_type: official_api
    license_type: public_official
    enabled_by_default: false
    trust_level: 95
    allowed_domains:
      - us_filings
      - us_insider_form4
    default_role: Primary
    validation_only: false
    rate_limit_policy: sec_identity_polite_api
    requires_user_setup: false
    official_api: true
    notes: 美国上市公司披露与 Form 4 内部人交易官方主源；必须带 User-Agent/contact 标识并保存 filing accession 与 content_hash。
  - source_id: cftc_cot
    source_name: CFTC Commitments of Traders
    source_type: official_api
    license_type: public_official
    enabled_by_default: false
    trust_level: 93
    allowed_domains:
      - cot_positioning
