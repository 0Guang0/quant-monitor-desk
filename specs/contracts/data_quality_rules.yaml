version: p0_round_1
contract_name: data_quality_rules
authoritative_doc: docs/modules/data_validation_and_conflict.md
ops_cli_design: docs/ops/data_health_cli.md
reference_landing:
  # R3F-R allows scoped QMD-owned adaptation from mature external references.
  task_id: R3F-R
  external_url_easyxt: https://github.com/quant-king299/EasyXT
  local_reference_paths:
    - 参考项目/EasyXT/data_manager/data_integrity_checker.py
    - 参考项目/EasyXT/data_manager/smart_data_detector.py
  note: >
    Integrity categories from EasyXT map to QMD-owned rule IDs below—not
    external DB paths, table names, SQL strings, or runtime imports. EasyXT rule
    ideas may be adapted for missing trading days, required-field nulls,
    non-positive prices, OHLC relation checks, extreme returns, volume outliers,
    completeness ratio, and compact report summaries.

# Profiles consumed by future `qmd data health` (Batch 6 / Phase C). Read-only by default.
ops_cli_profiles:
  market_bar_1d:
    rule_set_id: market_bar_p0
    default_window_days: 90
    rules:
      - MISSING_PRIMARY_KEY
      - DUPLICATE_PRIMARY_KEY
      - INVALID_PRICE_RANGE
      - NEGATIVE_PRICE
      - INVALID_VOLUME
      - STALE_DATA
      - INSUFFICIENT_HISTORY
      - MISSING_SOURCE_USED
    tables:
      - security_bar_1d
      - fetch_log
      - validation_report
  layer1_observation:
    rule_set_id: layer1_p0
    default_window_days: 30
    rules:
      - MISSING_SOURCE_USED
      - FALLBACK_WITHOUT_REASON
      - BLINDSPOT_SHOULD_NOT_HAVE_VALUE
    tables:
      - axis_observation
      - validation_report
  layer3_snapshot:
    rule_set_id: layer3_p0
    default_window_days: 30
    rules:
      - DUPLICATE_ANCHOR_ID
      - MISSING_NODE_REFERENCE
      - P0_MISSING_SOURCE_KEYS
    tables:
      - axis_snapshot_lineage
      - validation_report

common_rules:
  - id: MISSING_PRIMARY_KEY
    severity: failed
  - id: DUPLICATE_PRIMARY_KEY
    severity: failed
  - id: MISSING_REQUIRED_FIELD
    severity: failed_or_warning
  - id: MISSING_TIMESTAMP
    severity: failed
  - id: INVALID_ENUM
    severity: failed
  - id: SCHEMA_DRIFT
    severity: failed
  - id: CONTENT_CHANGED
    severity: warning
  - id: STALE_DATA
    severity: warning
  - id: INSUFFICIENT_HISTORY
    severity: warning
market_bar_rules:
  - id: INVALID_PRICE_RANGE
    condition: high < low
    severity: failed
  - id: NEGATIVE_PRICE
    condition: any price field < 0
    severity: failed
  - id: INVALID_VOLUME
    condition: volume < 0
    severity: failed
layer1_rules:
  - id: MISSING_SOURCE_USED
    severity: failed
  - id: FALLBACK_WITHOUT_REASON
    severity: failed
  - id: BLINDSPOT_SHOULD_NOT_HAVE_VALUE
    severity: failed
layer3_rules:
  - id: DUPLICATE_ANCHOR_ID
    severity: failed
  - id: MISSING_NODE_REFERENCE
    severity: failed
  - id: P0_MISSING_SOURCE_KEYS
    severity: failed
