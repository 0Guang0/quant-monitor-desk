rules:
  - qmt_xtdata on non-Windows is not schedulable by default
  - qmt_xqshare is never auto-probed and cannot become schedulable without env and explicit user authorization
  - platform matrix must feed SourceRoutePlan disabled_reason
required_tests:
  - tests/test_platform_source_matrix.py::test_qmtXtdataNonWindowsNotSchedulable
  - tests/test_platform_source_matrix.py::test_qmtXqshareMissingEnvNotSchedulable
