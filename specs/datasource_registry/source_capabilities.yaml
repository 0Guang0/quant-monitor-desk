        operations:
          fetch_sector_board:
            frequency: daily
            fields:
              [board_id, trade_date, metric_name, metric_value, source_used]
            supports_incremental: true
            requires_auth: false
      macro_supplementary:
        operations:
          fetch_macro_series:
            frequency: source_specific
            fields:
              [
                series_id,
                observation_date,
                metric_name,
                metric_value,
                source_used,
              ]
            supports_incremental: true
            requires_auth: false
            notes: "聚合源只能带 source_used 与 quality_flags；不得作为唯一事实源。"
  cninfo:
    domains:
      cn_filings:
        operations:
          fetch_filing_index:
            frequency: intraday_or_daily
            fields:
