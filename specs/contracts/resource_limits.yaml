version: v1
name: resource_limits_contract
purpose: Conservative local desktop resource limits for quant_monitor.
default_profile: eco
profiles:
  eco:
    max_threads: 2
    preferred_threads: 1
    process_rss_warn_mb: 800
    process_rss_pause_mb: 1200
    process_rss_hard_stop_mb: 1800
    duckdb_memory_min_mb: 512
    duckdb_memory_max_mb: 1536
    duckdb_temp_max_gb: 2
    max_parallel_non_core_jobs: 1
  normal:
    max_threads: 4
    preferred_threads: 2
    process_rss_warn_mb: 1200
    process_rss_pause_mb: 2000
    process_rss_hard_stop_mb: 3000
    duckdb_memory_min_mb: 1536
    duckdb_memory_max_mb: 3072
    duckdb_temp_max_gb: 5
    max_parallel_non_core_jobs: 1
  batch:
    requires_user_confirm: true
    max_threads_formula: min(physical_cores // 2, 8)
    process_rss_warn_mb: 3000
    process_rss_pause_mb: 4000
    process_rss_hard_stop_mb: 6000
    duckdb_memory_min_mb: 3072
    duckdb_memory_max_mb: 6144
    duckdb_temp_max_gb: 10
    max_parallel_non_core_jobs: 1
system_thresholds:
  available_memory_warn_gb: 4
  available_memory_pause_gb: 2
  available_memory_hard_stop_gb: 1
  system_memory_usage_warn_pct: 70
  system_memory_usage_pause_pct: 80
  system_memory_usage_hard_stop_pct: 90
  disk_free_warn_gb: 30
  disk_free_pause_gb: 20
  disk_free_hard_stop_gb: 10
  system_disk_usage_warn_pct: 75
  system_disk_usage_pause_pct: 85
  system_disk_usage_hard_stop_pct: 92
project_size_thresholds:
  project_warn_gb: 15
  project_pause_gb: 25
  project_hard_stop_gb: 40
  cache_warn_gb: 1
  cache_pause_gb: 2
  cache_hard_stop_gb: 4
api_limits:
  default_page_size: 100
  max_page_size: 500
  agent_default_rows: 100
  agent_max_rows: 500
  daily_bar_default_days: 90
  daily_bar_max_days: 365
  minute_bar_default_trading_days: 5
  minute_bar_max_trading_days: 20
actions:
  warn:
    - write_resource_guard_log
    - reduce_batch_size
  pause_non_core:
    - pause_backfill
    - pause_revision_audit
    - pause_full_reload
    - keep_api_readonly_available
  hard_stop:
    - stop_non_core_jobs
    - release_locks
    - write_failure_summary
    - require_human_confirmation
