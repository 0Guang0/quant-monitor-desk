version: live_tier_b_evidence_v1
status: accepted
owner: data_governance
task_id: m-data-03-tier-b-live
acceptance_mode: validation_fetch
authoritative_docs:
  - docs/modules/data_sources.md
  - docs/modules/data_validation_and_conflict.md
  - docs/ops/data_health_cli.md
  - specs/contracts/data_adapter_contract.md
  - specs/contracts/data_cli_contract.yaml
  - specs/contracts/sandbox_clean_write_contract.yaml
  - docs/decisions/ADR-015-tier-a-live-acceptance-sandbox.md
  - docs/decisions/ADR-008-product-live-env-gate.md

purpose: >
  Normative evidence envelope for Tier B live validation_fetch acceptance (10 sources).
  Product live fetch → raw evidence → F0 where applicable. Not incremental sync;
  validation_only sources per ADR-008 / R3H-08.

invariants:
  - no_skip_as_pass: true
  - isolated_data_root_only: true
  - canonical_main_db_forbidden: true
  - live_fetch_requires_qmd_allow_live_fetch: true
  - acceptance_mode: validation_fetch
  - no_clean_upsert_for_validation_only: true
  - e2_inspect_not_applicable: true
  - fetch_provenance_required_on_report: true
  - failure_classes:
      - PASS
      - FAIL_FIXABLE
      - FAIL_EXTERNAL
  - fail_external_requires_adr: true
  - retry_policy:
      network_timeout: limited_retry_then_classify
      fixable_technical: must_fix_before_close

failure_class_canonical:
  report_and_cli:
    - PASS
    - FAIL_FIXABLE
    - FAIL_EXTERNAL
  manifest_acceptance_field:
    - none
    - fixable_technical
    - external_environment
  mapping:
    PASS: none
    FAIL_FIXABLE: fixable_technical
    FAIL_EXTERNAL: external_environment
  rules:
    - CLI exit code and acceptance_report use report_and_cli values
    - manifest acceptance.failure_class uses manifest_acceptance_field values
    - Tests must assert via mapping table; no ad-hoc strings

envelope:
  manifest_filename: live_tier_b_evidence_manifest.json
  schema_version: live_tier_b_evidence_v1
  required_top_level_fields:
    - schema_version
    - source_id
    - run_id
    - job_id
    - data_domain
    - data_root
    - generated_at
    - fetch
    - evidence
    - acceptance
  fetch:
    required_fields:
      - source_id
      - status
      - content_hash
      - schema_hash
      - row_count
      - fetch_time
      - as_of_timestamp
    status_enum:
      - SUCCESS
      - EMPTY_RESPONSE
      - NOT_PUBLISHED_YET
      - DISABLED_SOURCE
      - AUTH_FAILED
      - RATE_LIMITED
      - NETWORK_ERROR
      - SCHEMA_DRIFT
      - FAILED
  evidence:
    required_fields:
      - raw_relative_paths
      - evidence_dir_relative
    optional_fields:
      - staging_relative_paths
      - vendor_api
      - pilot_request_id
  acceptance:
    required_fields:
      - disposition
      - failure_class
      - e2_inspect_status
      - f0_health_status
      - b2_validation_status
      - clean_table
      - rule_set_id
      - health_domain
      - health_profile_id
    disposition_enum:
      - pass
      - fail
    failure_class_enum:
      - none
      - fixable_technical
      - external_environment
    forbidden:
      - skip
      - skipped
      - inspect_only_without_health

required_tests:
  - tests/test_live_tier_b_evidence_contract.py
  - tests/test_tier_b_live_harness.py
  - tests/test_tier_b_live_acceptance_report.py
  - tests/test_tier_b_live_ci_manifest.py

