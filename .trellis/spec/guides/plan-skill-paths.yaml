# Plan Skill 路径 — Plan agent Read 必须使用本表（禁止读错同名 skill）
# v4.1：Execution Bundle — 产出结构见 plan-skill-outputs.yaml（文件名不固定，结构跟 SKILL.md）

version: "2"
plan_protocol_default: "4.1"

skills:
  agent-toolchain:
    path: agent-toolchain.md
    phase: boot
    default_role: 必做

  trellis-plan:
    path: .cursor/skills/trellis-plan/SKILL.md
    phase: boot
    default_role: 必做

  gitnexus-plan-1a:
    path: AGENTS.md
    phase: "1a"
    default_role: 必做
    note: "GitNexus MCP query + context → project-overview.md"

  gitnexus-plan-1b:
    path: AGENTS.md
    phase: "1b"
    default_role: 必做
    note: "GitNexus impact → gitnexus-summary.md"

  trellis-research:
    path: .cursor/agents/trellis-research.md
    phase: "1-4"
    default_role: 必做
    note: "参考项目/深度调研；产出 research/<topic>.md 或 reference-adoption-*.md"
    outputs_yaml: plan-skill-outputs.yaml#trellis-research

  trellis-brainstorm:
    path: .cursor/skills/trellis-brainstorm/SKILL.md
    phase: "2a"
    default_role: 可选
    note: "需求不明时；决策写入 prd.md 或 research/brainstorm-session.md"

  spec-driven-development:
    path: .agents/skills/spec-driven-development/SKILL.md
    phase: "2b"
    default_role: 必做

  domain-modeling:
    path: .claude/skills/domain-modeling/SKILL.md
    phase: "2"
    default_role: 条件

  grill-me:
    path: .claude/skills/grill-me/SKILL.md
    phase: "3"
    default_role: 可选
    note: "需求不明或有疑问时；决策写入 research/grill-me-session.md 或 ADR"

  interview-me:
    path: .agents/skills/interview-me/SKILL.md
    phase: "3"
    default_role: 可选

  idea-refine:
    path: .agents/skills/idea-refine/SKILL.md
    phase: "3"
    default_role: 可选
    note: "决策写入 research/idea-refine-session.md 或 ADR"

  grill-with-docs:
    path: .claude/skills/grill-with-docs/SKILL.md
    phase: "3"
    default_role: 可选

  to-issues:
    path: .claude/skills/to-issues/SKILL.md
    phase: "3.5"
    default_role: 必做
    outputs_yaml: plan-skill-outputs.yaml#to-issues

  brainstorming:
    path: .claude/plugins/cache/claude-plugins-official/superpowers/5.1.0/skills/brainstorming/SKILL.md
    phase: "4"
    default_role: 条件

  api-and-interface-design:
    path: .agents/skills/api-and-interface-design/SKILL.md
    phase: "4"
    default_role: 条件

  codebase-design:
    path: .claude/skills/codebase-design/SKILL.md
    phase: "4"
    default_role: 条件

  prototype:
    path: .claude/skills/prototype/SKILL.md
    phase: "4"
    default_role: 条件

  planning-and-task-breakdown:
    path: .agents/skills/planning-and-task-breakdown/SKILL.md
    phase: 5a
    default_role: 必做
    outputs_yaml: plan-skill-outputs.yaml#planning-and-task-breakdown

  context-engineering:
    path: .agents/skills/context-engineering/SKILL.md
    phase: 5b
    default_role: 必做
    outputs_yaml: plan-skill-outputs.yaml#context-engineering

  doubt-driven-development:
    path: .agents/skills/doubt-driven-development/SKILL.md
    phase: 5c
    default_role: 必做
    outputs_yaml: plan-skill-outputs.yaml#doubt-driven-development

  documentation-and-adrs:
    path: .agents/skills/documentation-and-adrs/SKILL.md
    phase: "5c'"
    default_role: 必做
    outputs_yaml: plan-skill-outputs.yaml#documentation-and-adrs

  trellis-before-dev:
    path: .cursor/skills/trellis-before-dev/SKILL.md
    phase: legacy
    default_role: 条件
    note: "v4.0 遗留 E1–E15 manifest；v4.1 新任务默认不启用，除非 meta.loop_manifest: legacy"

phases:
  boot:
    skills: [agent-toolchain, trellis-plan]
    artifacts:
      - research/plan-boot.md
    marker: "Phase P0 complete"

  P0-index:
    skills: [trellis-plan]
    artifacts_any:
      - EXECUTION_INDEX.md
    marker: "索引草稿"

  "1a":
    skills: [gitnexus-plan-1a]
    artifacts:
      - research/project-overview.md

  "1b":
    skills: [gitnexus-plan-1b]
    artifacts:
      - research/gitnexus-summary.md

  "1-4-research":
    skills: [trellis-research]
    note: "必做；产出 research/<topic>.md 或 reference-adoption-*.md"

  "2a":
    skills: [trellis-brainstorm]
    note: "可选：需求不明时用；决策落盘 prd 或 research/brainstorm-session.md"

  "2b":
    skills: [spec-driven-development]
    note: "Phase 2 初稿；Phase 5a' 加固产出登记 plan-spec*.md"

  "3":
    note: >
      可选澄清：需求不明或有未决疑问时，必须用 grill-me / interview-me /
      idea-refine / trellis-brainstorm 访问用户；决策写入 research/*-session.md 或 ADR
    artifacts_any:
      - research/grill-me-session.md
      - research/interview-me-session.md
      - research/idea-refine-session.md
      - research/grill-with-docs-session.md
      - research/brainstorm-session.md

  "3.5":
    skills: [to-issues]
    note: "垂直切片 → research/to-issues-slices.md（结构跟 to-issues SKILL + Trellis 扩展）"

  "4":
    skills_any:
      [brainstorming, api-and-interface-design, codebase-design, prototype]

  "5a":
    skills: [planning-and-task-breakdown]
    note: "Plan Document Template → research/plan-task-breakdown.md（或等价名，登记 ENTRY §5.1）"

  "5a-prime":
    skills: [spec-driven-development]
    note: "Spec template → research/plan-spec.md（或等价名）"

  "5b":
    skills: [context-engineering]
    note: "→ research/plan-context.md；定义 §5.2/§5.3"

  "5c":
    skills: [doubt-driven-development]
    artifacts:
      - research/plan-doubt-review.md

  "5c-prime":
    skills: [documentation-and-adrs]
    note: "→ docs/decisions/ADR-NNN-*.md + ENTRY §4"

  "5e":
    skills: [trellis-plan]
    artifacts:
      - research/00-EXECUTION-ENTRY.md
      - research/EXTERNAL-INDEX.md
      - research/plan-consolidation.md
      - EXECUTION_PLAN.md
    marker: "Phase 5e complete"
    note: "打包 Execution Bundle；frozen/INDEX 变薄指针"

freeze_required_skills_v41:
  - agent-toolchain
  - trellis-plan
  - gitnexus-plan-1a
  - gitnexus-plan-1b
  - trellis-research
  - to-issues
  - planning-and-task-breakdown
  - spec-driven-development
  - context-engineering
  - doubt-driven-development
  - documentation-and-adrs

freeze_required_skills_v40_legacy:
  - trellis-before-dev
  - writing-plans

freeze_phase3_one_of:
  - grill-me
  - interview-me
  - grill-with-docs

clarification_skills_optional:
  - trellis-brainstorm
  - grill-me
  - interview-me
  - idea-refine
  - grill-with-docs

boot_marker: "Phase P0 complete"

outputs_contract: .trellis/spec/guides/plan-skill-outputs.yaml
