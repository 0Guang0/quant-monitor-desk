version: 1
module: layer5_security_evidence
authoritative_doc: docs/modules/layer5_security_evidence.md
models:
  instrument_registry:
    primary_key: [instrument_id]
    required_fields: [instrument_id, symbol, asset_type, market_id, exchange, currency, is_active]
  security_bar_daily:
    primary_key: [instrument_id, trade_date, adjust_type]
    required_fields: [instrument_id, trade_date, open, high, low, close, volume, amount, source, quality_flag]
  futures_bar_daily:
    primary_key: [instrument_id, trade_date]
    required_fields: [instrument_id, trade_date, contract_code, underlying_id, close, open_interest, source, quality_flag]
  options_chain_snapshot:
    primary_key: [option_id, trade_date]
    required_fields: [option_id, underlying_id, trade_date, expiry_date, strike_price, option_type, close, source, quality_flag]
  event_registry:
    primary_key: [event_id]
    required_fields: [event_id, instrument_id, event_date, event_type, event_title, source, content_hash, quality_flag]
  evidence_chain:
    primary_key: [evidence_id]
    required_fields: [evidence_id, target_id, target_type, trade_date, evidence_summary, need_human_review, created_by]
quality_rules:
  - high_must_be_greater_or_equal_low
  - non_negative_volume_amount_open_interest
  - evidence_must_reference_structured_context
  - event_must_have_source_or_local_path
boundaries:
  no_trading_action_semantics: true
  no_agent_text_as_fact_source: true
