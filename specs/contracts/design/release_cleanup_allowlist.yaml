version: release_cleanup_allowlist_v1
purpose:
  Prevent final package cleanup from deleting formal docs/specs/contracts by
  mistake.
allowlist_roots:
  - README.md
  - MIGRATION_MAP.md
  - MANIFEST.json
  - FINAL_AUDIT_REPORT.md
  - docs/architecture/
  - docs/modules/
  - docs/api/
  - docs/ops/
  - docs/adr/
  - docs/quality/
  - docs/implementation_tasks/
  - specs/api/
  - specs/contracts/
  - specs/datasource_registry/
  - specs/frontend/
  - specs/layer1_axes/
  - specs/layer3_global_industry_chains/
  - specs/schema/
forbidden_patterns:
  - "**/__pycache__/**"
  - "**/.DS_Store"
  - "**/*.tmp"
  - "**/*.scratch"
  - "**/round_progress*"
  - "**/task_plan.md"
  - "**/findings.md"
  - "**/progress.md"
  - "**/*.zip"
cleanup_rules:
  dry_run_required: true
  manifest_before_delete_required: true
  restore_plan_required: true
  delete_only_if_matches_forbidden_and_not_allowlisted: true
tests:
  - test_cleanupDryRunDoesNotDeleteFiles
  - test_cleanupNeverDeletesSpecsContracts
  - test_cleanupProducesRestoreManifest
  - test_manifestSelfHashPolicy_isVerifiable
  - test_finalAuditReport_isAllowlisted
user_decision_D07_D10:
  trellis_cursor_policy: keep_master_audit_decisions_only
  evidence_policy: archive_fine_grained_evidence_to_artifacts_zip
  design_package_policy: docs_specs_tasks_only
  source_code_policy: external_git_repo_commit_and_ci_for_final_audit
