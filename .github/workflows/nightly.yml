name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  network-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Optional live vendor fetch smoke (--run-network)
        env:
          QMD_DATA_ROOT: .audit-sandbox/nightly-network
          QMD_ALLOW_LIVE_FETCH: "1"
        run: pytest -q --run-network -m network tests/test_fred_macro_incremental_e2e.py -k "mock"
