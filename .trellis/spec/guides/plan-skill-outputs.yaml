# Plan Skill 产出契约 — v4.2 默认 · v4.1 legacy 见 meta.v41
# v4.2：执行计划与索引均无固定模板；用户手动调用 Skill → 现场产出

version: plan_skill_outputs
plan_protocol_default: "4.2"

v42:
  execute_plan:
    path: EXECUTION_PLAN.md
    location: task_root
    no_fixed_template: true
    user_invokes_skills: true
    rule: >
      Agent 仅在用户显式调用某 Skill 时按该 Skill 写/改计划正文；
      禁止仓库预设章节骨架或 Skill→章节映射表。
  skill_merge_default: EXECUTION_PLAN.md
  execution_index:
    path: EXECUTION_INDEX.md
    location: task_root
    rule: >
      机器索引：§1 步骤/证据 · §3 manifest（外部必读路由）· §5 Audit 追溯。
      冻结前从计划摘录路由进 §3；不再单独维护 PLAN_INDEX.md。
  optional_research:
    - research/plan-boot.md
    - research/project-overview.md
    - research/gitnexus-summary.md
    - research/*-session.md
    - research/reference-adoption-*.md

v41_legacy:
  plan_protocol: "4.1"
  supersedes_for_new_tasks: writing-plans
  execute_entry: research/00-EXECUTION-ENTRY.md
  external_index: research/EXTERNAL-INDEX.md
  thin_plan: EXECUTION_PLAN.md

legacy_skills:
  to-issues:
    path: .claude/skills/to-issues/SKILL.md
    phase: "3.5"
    required: true
    output:
      location: research/
      filename: to-issues-slices.md
      structure_from_skill:
        - "垂直切片规则（vertical-slice-rules）"
        - "issue-template：What to build · Acceptance criteria · Blocked by"
      trellis_extensions:
        - "切片总表 + 依赖图"
        - "每切片：Execute Step · 建议测试 · RED/GREEN 证据路径"
      optional_companion:
        filename: bypass-baseline-matrix.md
        when: "任务涉入口/旁路/多 fetch 路径"

  planning-and-task-breakdown:
    path: .agents/skills/planning-and-task-breakdown/SKILL.md
    phase: 5a
    required: true
    output:
      location: research/
      filename_pattern: "plan-task-breakdown.md | plan-implementation.md"
      structure_from_skill:
        - "Plan Document Template：Overview · Architecture Decisions · Task List · Checkpoints · Risks · Open Questions"
        - "每个 Task：Description · Acceptance criteria · Verification · Dependencies · Files likely touched · Estimated scope"

  spec-driven-development:
    path: .agents/skills/spec-driven-development/SKILL.md
    phase: "5a'"
    required: true
    output:
      location: research/
      filename_pattern: "plan-spec.md | spec-*.md"
      structure_from_skill:
        - "Spec template：Objective · Tech Stack · Commands · Project Structure · Code Style · Testing Strategy · Boundaries · Success Criteria · Open Questions"
        - "ASSUMPTIONS 块（Phase Specify）"

  context-engineering:
    path: .agents/skills/context-engineering/SKILL.md
    phase: 5b
    required: true
    output:
      location: research/
      filename_pattern: plan-context.md
      structure_from_skill:
        - "Context Hierarchy L1–L5 对本任务的映射"
        - "PROJECT CONTEXT 块（可复制给 Execute agent）"
        - "按切片/模块的 Level 3 源码表"
        - "开工必读 vs 执行情境路由（与 00-EXECUTION-ENTRY §5.2/§5.3 对齐）"

  doubt-driven-development:
    path: .agents/skills/doubt-driven-development/SKILL.md
    phase: 5c
    required: true
    output:
      location: research/
      filename_pattern: plan-doubt-review.md
      structure_from_skill:
        - "Doubt cycle checklist（CLAIM · EXTRACT · DOUBT · RECONCILE · STOP）"
        - "每个非平凡决策一轮；发现分类 actionable/trade-off/noise"

  documentation-and-adrs:
    path: .agents/skills/documentation-and-adrs/SKILL.md
    phase: "5c'"
    required: true
    output:
      location: docs/decisions/
      filename_pattern: "ADR-NNN-<slug>.md"
      structure_from_skill:
        - "ADR Template：Status · Date · Context · Decision · Alternatives Considered · Consequences"
      index_in:
        - research/00-EXECUTION-ENTRY.md §4
        - docs/decisions/README.md

  trellis-research:
    path: .cursor/agents/trellis-research.md
    phase: "1-4"
    required: true
    output:
      location: research/
      filename_pattern: "<topic-slug>.md | reference-adoption-<topic>.md"
      structure_from_skill:
        - "trellis-research File Format：Query · Scope · Date · Findings · Caveats"
      reference_adoption:
        rule: "参考项目结论必须引用实际源码路径；禁止 README 为权威"
        suggested_slug: reference-adoption-<task-topic>.md

  trellis-plan:
    path: .cursor/skills/trellis-plan/SKILL.md
    phase: 5e
    required: true
    note: "v4.1 legacy only — 产出 ENTRY/EXTERNAL/consolidation；v4.2 见 v42.execution_index"
    output:
      location: research/
      files:
        - 00-EXECUTION-ENTRY.md
        - EXTERNAL-INDEX.md
        - plan-consolidation.md
      task_root:
        - EXECUTION_PLAN.md

packaging_5e_v41_legacy:
  entry_sections_required:
    - "§1 目的/价值/完成条件（跨文件汇总）"
    - "§2 约束/规则（含出处指针）"
    - "§3 验证命令"
    - "§4 ADR 索引"
    - "§5.1 包内文件地图（登记全部 research/*.md）"
    - "§5.2 切片开工前必读"
    - "§5.3 执行阶段情境路由"
  external_index_sections:
    - "§A 切片开工前必读（外部）"
    - "§B 执行情境路由（外部）"
    - "§C 源码/测试字典"

freeze_v41:
  frozen: "薄指针快照（freeze-task-card 自动生成）；Execute 规格见 research/00-EXECUTION-ENTRY"
  frozen_must_not: "复制 to-issues-slices 全文或活卡全文"
  execution_index: "§0 步骤表 + §3 manifest + §5 Audit 追溯"
  implement_jsonl:
    slot1: frozen/*.md
    slot2: research/00-EXECUTION-ENTRY.md

hard_rules_v42:
  - no_execution_plan_template: "禁止 EXECUTION_PLAN 固定模板或机械 Skill→章节映射"
  - user_invokes_skills: "Skill 由用户手动调用；禁止 Plan agent 擅自批量跑 Skill 填计划"
  - single_ssot_plan: "执行计划正文只在 EXECUTION_PLAN.md"
  - single_ssot_index: "路由/外部必读/切片指针只在 EXECUTION_INDEX.md（§1/§3/§5）"
  - no_duplicate_frozen: "frozen/INDEX 只指针，不复制计划正文"

hard_rules_v41:
  - single_ssot_slices: "切片 AC 只在 to-issues-slices.md（v4.1 legacy）"
  - no_duplicate_frozen: "frozen/INDEX 只指针，不复制包内正文"
  - skill_structure_not_filename: "产出结构以 SKILL.md 为准"
  - gitnexus_required: "Phase 1a+1b 必做"
  - trellis_research_required: "必做"
  - clarification_when_ambiguous: "需求不明须 grill-gate 后写 session/ADR"

hard_rules:
